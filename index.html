  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--sans); color:var(--ink); background:var(--canvas);
    -webkit-font-smoothing:antialiased; line-height:1.45;
    display:flex; flex-direction:column;
    height:100vh; height:100dvh; overflow:hidden;   /* app shell — page itself doesn't scroll */
  }
  .num{font-family:var(--mono); font-variant-numeric:tabular-nums; font-feature-settings:"tnum"}
  button{font-family:inherit; cursor:pointer}
  input,select{font-family:inherit; font-size:15px}
  h1,h2,h3{margin:0; line-height:1.2}
  a{color:var(--primary-dark)}

  /* Header */
  header{
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:calc(14px + env(safe-area-inset-top)) 18px 14px; z-index:20; flex:0 0 auto;
  }
  .head-row{display:flex; align-items:center; gap:12px; max-width:760px; margin:0 auto}
  .brand{display:flex; align-items:baseline; gap:9px}
  .brand .mark{
    width:30px;height:30px;border-radius:8px;background:#000;overflow:hidden;
    display:inline-flex;align-items:center;justify-content:center; transform:translateY(4px);
  }
  .brand .mark img{width:100%;height:100%;object-fit:cover;display:block}
  .brand h1{font-size:19px; letter-spacing:-.01em; font-weight:750}
  .brand .sub{font-size:11px; color:var(--muted); font-weight:600; letter-spacing:.04em; text-transform:uppercase}
  .head-spacer{flex:1}
  .budget-chip{
    text-align:right; line-height:1.1; cursor:pointer; padding:6px 10px; border-radius:10px;
    border:1px solid var(--border); background:var(--canvas);
  }
  .budget-chip .lab{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; font-weight:700}
  .budget-chip .val{font-size:15px; font-weight:700}

  main{flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; padding:18px 16px 36px}
  main > *{max-width:760px; margin-left:auto; margin-right:auto}

  /* Tab bar (always pinned at the bottom of the app shell) */
  nav.tabs{
    flex:0 0 auto; z-index:30;
    background:var(--surface); border-top:1px solid var(--border);
    display:flex; justify-content:center; gap:2px; padding:6px 8px calc(6px + env(safe-area-inset-bottom));
  }
  nav.tabs button{
    flex:1; max-width:160px; border:0; background:none; color:var(--muted);
    padding:7px 4px 5px; border-radius:10px; font-size:11px; font-weight:650;
    display:flex; flex-direction:column; align-items:center; gap:3px; transition:color .15s, background .15s;
  }
  nav.tabs button .ic{font-size:19px; line-height:1}
  nav.tabs button.active{color:var(--primary-dark); background:var(--primary-soft)}

  /* Cards & generic */
  .card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow)}
  .section-title{display:flex; align-items:center; gap:10px; margin:4px 2px 12px}
  .section-title h2{font-size:15px; font-weight:750; letter-spacing:-.01em}
  .section-title .count{font-size:12px; color:var(--muted); font-weight:600}
  .section-title .grow{flex:1}

  .btn{
    border:1px solid var(--primary); background:var(--primary); color:#fff;
    padding:9px 14px; border-radius:10px; font-weight:650; font-size:14px;
    display:inline-flex; align-items:center; gap:6px; transition:filter .15s;
  }
  .btn:hover{filter:brightness(1.05)}
  .btn.ghost{background:var(--surface); color:var(--primary-dark)}
  .btn.tiny{padding:5px 9px; font-size:12px; border-radius:8px}
  .btn.subtle{background:var(--canvas); color:var(--ink); border-color:var(--border-strong)}
  .icon-btn{border:1px solid var(--border); background:var(--surface); color:var(--muted); width:30px;height:30px;border-radius:8px; display:inline-flex; align-items:center; justify-content:center; font-size:15px}
  .icon-btn:hover{color:var(--ink); border-color:var(--border-strong)}
  .icon-btn.danger:hover{color:var(--danger); border-color:var(--danger)}

  .pill{
    display:inline-block; font-size:10.5px; font-weight:700; letter-spacing:.03em; text-transform:uppercase;
    padding:2px 7px; border-radius:999px; background:var(--primary-soft); color:var(--primary-dark);
  }
  .pill.cat{background:var(--canvas); color:var(--muted); border:1px solid var(--border)}

  .empty{
    text-align:center; padding:34px 20px; color:var(--muted);
  }
  .empty .big{font-size:34px; margin-bottom:6px}
  .empty p{margin:6px 0 16px; font-size:14px; max-width:340px; margin-left:auto; margin-right:auto}

  /* Receipt line */
  .rline{display:flex; align-items:baseline; gap:8px; padding:7px 0}
  .rline .name{font-weight:550}
  .rline .lead{flex:1; border-bottom:1.5px dotted var(--border-strong); transform:translateY(-3px); min-width:14px}
  .rline .amt{font-weight:650}
  .rline .sub{font-size:12px; color:var(--muted)}

  /* Meal cards */
  .meal{padding:14px 16px; margin-bottom:12px}
  .meal-top{display:flex; align-items:flex-start; gap:12px}
  .meal-top .grow{flex:1; min-width:0}
  .meal-name{font-size:16px; font-weight:700; letter-spacing:-.01em}
  .meal-meta{font-size:12.5px; color:var(--muted); margin-top:3px}
  .cps{
    text-align:right; white-space:nowrap;
  }
  .cps .v{font-size:21px; font-weight:750; color:var(--primary-dark)}
  .cps .l{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; font-weight:700}

  /* Inputs */
  label.field{display:block; margin-bottom:12px}
  label.field .lab{display:block; font-size:12px; font-weight:650; color:var(--muted); margin-bottom:5px}
  input[type=text],input[type=number],select{
    width:100%; padding:9px 11px; border:1px solid var(--border-strong); border-radius:9px;
    background:var(--surface); color:var(--ink);
  }
  input:focus,select:focus{outline:2px solid var(--primary-soft); outline-offset:0; border-color:var(--primary)}
  .row{display:flex; gap:10px}
  .row > *{flex:1}
  .checkrow{display:flex; align-items:center; gap:8px}

  /* Modal */
  .scrim{position:fixed; inset:0; background:rgba(27,35,26,.42); z-index:50; display:flex; align-items:flex-end; justify-content:center; padding:0}
  .modal{background:var(--surface); width:100%; max-width:560px; max-height:92vh; max-height:92dvh; overflow:auto; border-radius:18px 18px 0 0; padding:20px 18px calc(20px + env(safe-area-inset-bottom))}
  .modal-head{display:flex; align-items:center; gap:10px; margin-bottom:16px}
  .modal-head h3{font-size:17px; font-weight:750; flex:1}
  @media(min-width:620px){
    .scrim{align-items:center}
    .modal{border-radius:18px; max-height:88vh; max-height:88dvh}
  }

  /* Ingredient editor rows */
  .ing-row{display:flex; gap:8px; align-items:center; padding:8px 0; border-bottom:1px solid var(--border)}
  .ing-row:last-child{border-bottom:0}
  .ing-row .nm{flex:1; min-width:0; font-weight:550; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .ing-row input.qty{width:74px}
  .ing-row select.un{width:64px; padding:8px 6px}
  .ing-row .cost{width:62px; text-align:right; font-weight:650; font-size:13.5px}

  /* Pantry list */
  .pitem{display:flex; align-items:center; gap:10px; padding:11px 14px; border-bottom:1px solid var(--border)}
  .pitem:last-child{border-bottom:0}
  .pitem .grow{flex:1; min-width:0}
  .pitem .pname{font-weight:600; font-size:14.5px}
  .pitem .pmeta{font-size:12px; color:var(--muted); margin-top:2px}
  .pitem .punit{text-align:right; white-space:nowrap}
  .pitem .punit .pp{font-weight:700}
  .pitem .punit .pu{font-size:11px; color:var(--muted)}

  /* Shopping */
  .sitem{display:flex; align-items:center; gap:11px; padding:11px 14px; border-bottom:1px solid var(--border)}
  .sitem:last-child{border-bottom:0}
  .sitem.done .sname{text-decoration:line-through; color:var(--muted)}
  .check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border-strong); display:inline-flex;align-items:center;justify-content:center; flex:0 0 auto; color:#fff; font-size:13px}
  .check.on{background:var(--primary); border-color:var(--primary)}
  .sitem .grow{flex:1; min-width:0}
  .sname{font-weight:600; font-size:14.5px}
  .smeta{font-size:12px; color:var(--muted); margin-top:2px}
  .sitem .sc{font-weight:700; white-space:nowrap}

  /* Plan rows */
  .planrow{display:flex; align-items:center; gap:11px; padding:12px 14px; border-bottom:1px solid var(--border)}
  .planrow:last-child{border-bottom:0}
  .planrow .grow{flex:1; min-width:0}
  .planrow .pn{font-weight:650}
  .planrow .pm{font-size:12px; color:var(--muted); margin-top:2px}
  .stepper{display:flex; align-items:center; gap:0; border:1px solid var(--border-strong); border-radius:9px; overflow:hidden}
  .stepper button{border:0; background:var(--canvas); width:30px; height:32px; font-size:17px; color:var(--ink)}
  .stepper button:hover{background:var(--primary-soft)}
  .stepper .n{width:30px; text-align:center; font-weight:700; font-size:14px}

  /* Summary bar */
  .summary{padding:16px; margin-bottom:16px; background:linear-gradient(135deg,var(--grad-a) 0%, var(--grad-b) 100%); color:#fff; border:0}
  .summary .lab{font-size:11px; text-transform:uppercase; letter-spacing:.06em; opacity:.85; font-weight:700}
  .summary .big{font-size:33px; font-weight:780; letter-spacing:-.02em; margin-top:1px}
  .summary .meta{font-size:13px; opacity:.92; margin-top:2px}
  .bbar{height:7px; border-radius:999px; background:rgba(255,255,255,.28); margin-top:13px; overflow:hidden}
  .bbar > div{height:100%; background:#fff; border-radius:999px; transition:width .35s}
  .bbar.over > div{background:#FFD8A8}
  .summary .budline{display:flex; justify-content:space-between; font-size:12px; margin-top:7px; opacity:.92}

  .note{font-size:12px; background:var(--amber-soft); border:1px solid var(--border-strong); color:var(--amber); padding:10px 12px; border-radius:10px; margin-bottom:16px; display:flex; gap:8px}
  .note b{color:var(--amber)}

  .hr{height:1px; background:var(--border); margin:14px 0}
  .right{margin-left:auto}
  .muted{color:var(--muted)}
  .danger-link{background:none;border:0;color:var(--danger);font-size:13px;font-weight:600;padding:6px 0}
  .toast{position:fixed; bottom:calc(86px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); background:var(--ink); color:var(--canvas); padding:10px 16px; border-radius:10px; font-size:13.5px; font-weight:600; z-index:80; box-shadow:var(--shadow); opacity:0; transition:opacity .2s, transform .2s; pointer-events:none}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-4px)}
  .daynav{display:flex; align-items:center; gap:12px; margin-bottom:14px}
  .daynav .icon-btn{width:40px; height:40px; font-size:22px}
  .daylabel{flex:1; text-align:center}
  .daylabel .dl{font-size:17px; font-weight:750; letter-spacing:-.01em}
  .seg-row{display:flex; gap:6px}
  .seg{flex:1; border:1px solid var(--border-strong); background:var(--surface); color:var(--muted); padding:8px 4px; border-radius:9px; font-size:12.5px; font-weight:650}
  .seg.on{background:var(--primary); border-color:var(--primary); color:#fff}
  .logitem{display:flex; align-items:center; gap:7px; padding:11px 14px; border-bottom:1px solid var(--border)}
  .logitem:last-child{border-bottom:0}
  .logitem .grow{flex:1; min-width:0}
  .logitem .lname{font-weight:600; font-size:14.5px}
  .logitem .lmeta{font-size:12px; color:var(--muted); margin-top:2px}

  /* Settings */
  .cog{border:1px solid var(--border); background:var(--surface); color:var(--muted); width:38px;height:38px;border-radius:10px; display:inline-flex; align-items:center; justify-content:center; font-size:19px; flex:0 0 auto}
  .cog:hover{color:var(--primary-dark); border-color:var(--border-strong)}
  .set-row{display:flex; align-items:center; gap:12px; padding:13px 2px; border-bottom:1px solid var(--border)}
  .set-row:last-of-type{border-bottom:0}
  .set-row .grow{flex:1; min-width:0}
  .set-row .st{font-weight:600; font-size:14.5px}
  .set-row .sd{font-size:12px; color:var(--muted); margin-top:2px}
  .set-head{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:16px 2px 2px}
  .switch{width:46px; height:27px; border-radius:999px; border:0; background:var(--border-strong); position:relative; flex:0 0 auto; transition:background .18s}
  .switch.on{background:var(--primary)}
  .switch::after{content:""; position:absolute; top:3px; left:3px; width:21px; height:21px; border-radius:50%; background:#fff; transition:transform .18s; box-shadow:0 1px 2px rgba(0,0,0,.25)}
  .switch.on::after{transform:translateX(19px)}
  .unit-toggle{display:inline-flex; border:1px solid var(--border-strong); border-radius:8px; overflow:hidden; font-size:11px; font-weight:700; vertical-align:middle; margin-left:8px}
  .unit-toggle button{border:0; background:var(--surface); color:var(--muted); padding:3px 9px}
  .unit-toggle button.on{background:var(--primary); color:#fff}
  .basis-chip{display:inline-flex; align-items:center; justify-content:center; padding:0 12px; border:1px solid var(--border-strong); border-radius:9px; background:var(--canvas); color:var(--muted); font-weight:650; font-size:13px; white-space:nowrap}
  .starbtn{border:0; background:none; color:var(--border-strong); font-size:18px; line-height:1; cursor:pointer; padding:0; flex:0 0 auto}
  .starbtn.on{color:#F5B301}
  .starbtn:hover{color:#F5B301}
  .favchip{border:1px solid var(--border-strong); background:var(--surface); color:var(--muted); border-radius:999px; padding:6px 14px; font-size:13px; font-weight:650; cursor:pointer; white-space:nowrap}
  .favchip.on{background:#FEF3D6; border-color:#F5B301; color:#9A6B00}
  :root[data-theme="dark"] .favchip.on{background:#3A2E10; color:#F5C547}
  .btn.danger{background:var(--danger); border-color:var(--danger); color:#fff}
  .btn.danger:hover{filter:brightness(.94)}
  @media (prefers-reduced-motion: reduce){*{transition:none !important}}
</style>

/* ---------------- State + persistence ---------------- */
const KEY='pantry:data:v1';
let S = null;
let TAB='plan';
let ready=false;

function uid(){return 'i'+Math.random().toString(36).slice(2,9)}
function clone(o){return JSON.parse(JSON.stringify(o))}

/* Persistence layer.
   Saves to the device via localStorage (works in any browser, on your phone,
   added-to-home-screen, etc.) and also to Claude's window.storage when it
   exists. Reading prefers whichever has data. We only report a problem if
   BOTH backends fail, so data that actually persisted never shows an error. */
const Store = {
  async get(k){
    try{ if(window.storage && window.storage.get){ const r=await window.storage.get(k); if(r && r.value!=null) return r.value; } }catch(e){}
    try{ const v=localStorage.getItem(k); if(v!=null) return v; }catch(e){}
    return null;
  },
  async set(k,v){
    let ok=false;
    try{ if(window.storage && window.storage.set){ await window.storage.set(k,v); ok=true; } }catch(e){}
    try{ localStorage.setItem(k,v); ok=true; }catch(e){}
    return ok;
  }
};

async function load(){
  try{
    const v = await Store.get(KEY);
    if(v){ S = JSON.parse(v); }
  }catch(e){ /* no saved data yet */ }
  if(!S){ S = clone(SEED); }
  // backfill missing keys
  S.budget = S.budget ?? 150;
  S.pantry = S.pantry || [];
  S.meals = S.meals || [];
  S.plan = S.plan || [];
  S.extras = S.extras || [];
  S.checked = S.checked || {};
  S.log = S.log || {};
  S.targets = S.targets || {kcal:0,p:0,c:0,f:0};
  S.settings = S.settings || {};
  if(S.settings.dark==null) S.settings.dark = false;
  if(!S.settings.energyUnit) S.settings.energyUnit = 'kcal';
  if(!S.settings.weightUnit) S.settings.weightUnit = 'kg';
  S.weights = S.weights || [];
  // every pantry item gets a nutrition basis (amount the macros are quoted per)
  S.pantry.forEach(p=>{ if(p.nutriBasis==null) p.nutriBasis = familyOf(p.unit)==='count' ? 1 : 100; });
  // plan entries can now be meals, single pantry foods, or quick custom items.
  // migrate any old {mealId,servings} rows to the typed shape.
  S.plan = S.plan.map(pl=> pl.type ? pl : {type:'meal', mealId:pl.mealId, servings:pl.servings});
  applyTheme();
  ready=true;
}
let saveTimer=null;
function save(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    const ok = await Store.set(KEY, JSON.stringify(S));
    if(!ok) toast('Could not save — storage unavailable');
  },150);
}

/* ---------------- Money / calc helpers ---------------- */
const money = n => '$'+(Math.round((n+Number.EPSILON)*100)/100).toFixed(2);
const item = pid => S.pantry.find(p=>p.id===pid);
const meal = mid => S.meals.find(m=>m.id===mid);

/* ---------------- Theme + energy unit ---------------- */
const KJ_PER_KCAL = 4.184;
function applyTheme(){ document.documentElement.dataset.theme = (S.settings && S.settings.dark) ? 'dark' : ''; }
function energyUnit(){ return (S.settings && S.settings.energyUnit) || 'kcal'; }
const LB_PER_KG = 2.2046226218;
function weightUnit(){ return (S.settings && S.settings.weightUnit) || 'kg'; }
function kgToDisp(kg){ return weightUnit()==='lb' ? kg*LB_PER_KG : kg; }
function dispToKg(v){ return weightUnit()==='lb' ? v/LB_PER_KG : v; }
function wfmt(kg){ return (Math.round(kgToDisp(kg)*10)/10).toFixed(1); }
function toDisp(kcal){ return energyUnit()==='kJ' ? kcal*KJ_PER_KCAL : kcal; }   // kcal -> displayed value
function fromDisp(v){ return energyUnit()==='kJ' ? v/KJ_PER_KCAL : v; }            // displayed value -> kcal
function energyStr(kcal){ return Math.round(toDisp(kcal)) + ' ' + energyUnit(); }

function pricePerBase(p){ // $ per base unit
  const base = p.size * (UNITS[p.unit]?UNITS[p.unit].toBase:1);
  return base>0 ? p.price/base : 0;
}
function ingCost(ing){
  const p=item(ing.pid); if(!p) return 0;
  return toBase(ing.qty, ing.unit) * pricePerBase(p);
}
function mealTotal(m){ return (m.ings||[]).reduce((s,i)=>s+ingCost(i),0); }
function mealPerServing(m){ return m.servings>0 ? mealTotal(m)/m.servings : 0; }

/* Macros. nutri stored per 100g (weight), per 100ml (volume), or per 1 item (count). */
function ingMacros(ing){
  const p=item(ing.pid); const n=p&&p.nutri; if(!p||!n) return {kcal:0,p:0,c:0,f:0};
  const base=toBase(ing.qty, ing.unit);             // grams, ml, or count
  const basis = (p.nutriBasis>0 ? p.nutriBasis : (familyOf(p.unit)==='count'?1:100)); // basis in base units
  const factor = base / basis;
  return {kcal:(n.kcal||0)*factor, p:(n.p||0)*factor, c:(n.c||0)*factor, f:(n.f||0)*factor};
}
function mealMacros(m){
  return (m.ings||[]).reduce((s,i)=>{const x=ingMacros(i);return{kcal:s.kcal+x.kcal,p:s.p+x.p,c:s.c+x.c,f:s.f+x.f}},{kcal:0,p:0,c:0,f:0});
}
function mealMacrosPerServing(m){ const t=mealMacros(m); const d=m.servings>0?m.servings:1; return {kcal:t.kcal/d,p:t.p/d,c:t.c/d,f:t.f/d}; }
function hasMacros(m){ const t=mealMacros(m); return (t.kcal+t.p+t.c+t.f)>0; }
function macroStrip(mac){
  const its=[[energyUnit(),Math.round(toDisp(mac.kcal)),''],['Protein',Math.round(mac.p),'g'],['Carbs',Math.round(mac.c),'g'],['Fat',Math.round(mac.f),'g']];
  return `<div style="display:flex;gap:6px">`+its.map(([l,v,u])=>`<div style="flex:1;text-align:center;background:var(--surface);border-radius:8px;padding:6px 2px"><div class="num" style="font-weight:750;font-size:15px;color:var(--ink)">${v}${u}</div><div style="font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--primary-dark);font-weight:700">${l}</div></div>`).join('')+`</div>`;
}
function macroLine(mac){ return `${energyStr(mac.kcal)} · ${Math.round(mac.p)}g P · ${Math.round(mac.c)}g C · ${Math.round(mac.f)}g F`; }
function nutriBasisAmt(p){ return (p&&p.nutriBasis>0)?p.nutriBasis:(familyOf(p&&p.unit)==='count'?1:100); }
function nutriBasisLabel(p){ const f=familyOf(p.unit); const a=nutriBasisAmt(p); return f==='weight'?`per ${a} g`:(f==='volume'?`per ${a} ml`:(a===1?'per item':`per ${a} items`)); }
function nutriBasisShort(p){ const f=familyOf(p.unit); const a=nutriBasisAmt(p); return f==='weight'?`/${a}g`:(f==='volume'?`/${a}ml`:(a===1?'/ea':`/${a}ea`)); }

// pretty quantity in a unit: trims trailing zeros
function qtyStr(n,u){
  let v = Math.round((n+Number.EPSILON)*100)/100;
  let s = (v % 1 === 0) ? v.toString() : v.toFixed(2).replace(/0+$/,'').replace(/\.$/,'');
  return s+' '+(UNITS[u]?UNITS[u].label:u);
}

/* Build aggregated shopping needs from the plan */
function buildShopping(){
  const need = {}; // pid -> base qty needed
  S.plan.forEach(pl=>{
    const type = pl.type||'meal';
    if(type==='item'){ if(pl.pid){ need[pl.pid] = (need[pl.pid]||0) + toBase(pl.qty, pl.unit)*(pl.count||1); } return; }
    if(type==='custom'){ return; }   // one-off custom plan items aren't tied to a pantry product
    const m=meal(pl.mealId); if(!m||m.servings<=0) return;
    const scale = pl.servings / m.servings;
    (m.ings||[]).forEach(ing=>{
      const b = toBase(ing.qty, ing.unit)*scale;
      need[ing.pid] = (need[ing.pid]||0)+b;
    });
  });
  const lines = Object.keys(need).map(pid=>{
    const p=item(pid); if(!p) return null;
    const base = p.size*(UNITS[p.unit]?UNITS[p.unit].toBase:1);
    const onHandBase = (p.onHand||0)*(UNITS[p.unit]?UNITS[p.unit].toBase:1);
    const toBuyBase = Math.max(0, need[pid]-onHandBase);
    const packs = base>0 ? Math.ceil(toBuyBase/base - 1e-9) : 0;
    const cost = packs*p.price;
    return {
      id:'plan_'+pid, pid, name:p.name, cat:p.cat,
      neededDisp: need[pid]/(UNITS[p.unit]?UNITS[p.unit].toBase:1),
      onHandDisp: p.onHand||0, unit:p.unit, packs, packSize:p.size, cost,
      fromPlan:true,
    };
  }).filter(Boolean).filter(l=>l.packs>0 || l.neededDisp>0);
  return lines;
}

/* ---- Weight tracking ---- */
function fmtShortDate(d){ const dt=new Date(d+'T00:00'); return isNaN(dt)? d : dt.toLocaleDateString(undefined,{day:'numeric',month:'short'}); }
function weightChartSVG(ws){
  const W=600,H=230,padL=14,padR=46,padT=16,padB=22;
  const xs=ws.map(w=>new Date(w.d+'T00:00').getTime());
  const minX=Math.min(...xs),maxX=Math.max(...xs);
  const ys=ws.map(w=>kgToDisp(w.kg));
  let minY=Math.min(...ys),maxY=Math.max(...ys);
  if(minY===maxY){ minY-=1; maxY+=1; }
  const pad=(maxY-minY)*0.18; minY-=pad; maxY+=pad;
  const pw=W-padL-padR, ph=H-padT-padB;
  const X=t=> (maxX===minX)? padL+pw/2 : padL+(t-minX)/(maxX-minX)*pw;
  const Y=v=> padT+(1-(v-minY)/(maxY-minY))*ph;
  const P=ws.map((w,i)=>({x:X(xs[i]),y:Y(ys[i])}));
  const line=P.map((p,i)=>(i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' ');
  const area=`M${P[0].x.toFixed(1)} ${(padT+ph).toFixed(1)} `+P.map(p=>'L'+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' ')+` L${P[P.length-1].x.toFixed(1)} ${(padT+ph).toFixed(1)} Z`;
  const gMax=(Math.round(maxY*10)/10).toFixed(1), gMin=(Math.round(minY*10)/10).toFixed(1);
  const dots=P.map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="var(--surface)" stroke="#2BA0DC" stroke-width="2.5"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;height:auto">
    <defs>
      <linearGradient id="wline" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1E86C7"/><stop offset="1" stop-color="#5BD0F2"/></linearGradient>
      <linearGradient id="warea" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2BA0DC" stop-opacity="0.30"/><stop offset="1" stop-color="#2BA0DC" stop-opacity="0"/></linearGradient>
    </defs>
    <line x1="${padL}" y1="${padT}" x2="${W-padR}" y2="${padT}" stroke="var(--border)" stroke-width="1"/>
    <line x1="${padL}" y1="${(padT+ph).toFixed(1)}" x2="${W-padR}" y2="${(padT+ph).toFixed(1)}" stroke="var(--border)" stroke-width="1"/>
    <text x="${W-padR+6}" y="${padT+4}" font-size="13" fill="var(--muted)" font-weight="600">${gMax}</text>
    <text x="${W-padR+6}" y="${(padT+ph).toFixed(1)}" font-size="13" fill="var(--muted)" font-weight="600">${gMin}</text>
    ${P.length>1?`<path d="${area}" fill="url(#warea)"/>`:''}
    ${P.length>1?`<path d="${line}" fill="none" stroke="url(#wline)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>`:''}
    ${dots}
  </svg>`;
}
function renderWeightSection(){
  const u=weightUnit();
  const ws=(S.weights||[]).slice().sort((a,b)=> a.d<b.d?-1:1);
  let html=`<div class="hr"></div><div class="section-title"><h2>Weight</h2><span class="grow"></span>`
    +`<span class="unit-toggle" id="wUnit"><button data-wu="kg" class="${u==='kg'?'on':''}">kg</button><button data-wu="lb" class="${u==='lb'?'on':''}">lb</button></span>`
    +`<button class="btn tiny" id="logWeight" style="margin-left:8px">+ Log</button></div>`;
  if(!ws.length){
    html+=`<div class="card empty"><div class="big">⚖️</div><p>No weigh-ins yet. Log your weight to start tracking your trend over time.</p><button class="btn" id="logWeight2">+ Log your weight</button></div>`;
    return html;
  }
  const latest=ws[ws.length-1], first=ws[0];
  const diff=latest.kg-first.kg;
  const diffDisp=(Math.round(kgToDisp(Math.abs(diff))*10)/10).toFixed(1);
  const arrow=diff>0.0005?'▲':(diff<-0.0005?'▼':'•');
  const diffColor=diff>0.0005?'var(--danger)':(diff<-0.0005?'#1FA971':'var(--muted)');
  html+=`<div class="card" style="padding:16px">
    <div style="display:flex;align-items:baseline;gap:10px">
      <div class="num" style="font-size:30px;font-weight:800;letter-spacing:-.02em">${wfmt(latest.kg)}<span style="font-size:15px;font-weight:600;color:var(--muted)"> ${u}</span></div>
      ${ws.length>1?`<div class="num" style="font-size:13px;font-weight:750;color:${diffColor}">${arrow} ${diffDisp} ${u}</div>`:''}
    </div>
    <div class="muted" style="font-size:12px;margin:2px 0 12px">Latest · ${fmtShortDate(latest.d)}${ws.length>1?` · ${ws.length} weigh-ins`:''}</div>
    ${weightChartSVG(ws)}
  </div>`;
  html+=`<div class="card" style="margin-top:10px;padding:2px 0">`;
  ws.slice().reverse().slice(0,8).forEach(w=>{
    html+=`<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)">
      <span class="num grow" style="font-weight:700">${wfmt(w.kg)} ${u}</span>
      <span class="muted num" style="font-size:12.5px">${fmtShortDate(w.d)}</span>
      <button class="icon-btn danger" data-wdel="${w.d}" title="Remove">✕</button>
    </div>`;
  });
  html+=`</div>`;
  return html;
}
function openWeightLog(){
  const u=weightUnit();
  const ws=(S.weights||[]).slice().sort((a,b)=> a.d<b.d?-1:1);
  const prefill = ws.length? wfmt(ws[ws.length-1].kg) : '';
  showModal('Log weight', `
    <label class="field"><span class="lab">Weight (${u})</span><input type="number" id="wVal" min="0" step="any" inputmode="decimal" value="${prefill}" placeholder="e.g. ${u==='kg'?'72.5':'160'}"></label>
    <label class="field"><span class="lab">Date</span><input type="date" id="wDate" value="${todayKey()}" max="${todayKey()}"></label>
    <div style="display:flex;gap:10px;margin-top:14px"><button class="btn subtle" id="wCancel" style="flex:1">Cancel</button><button class="btn" id="wSave" style="flex:2">Save</button></div>`);
  setTimeout(()=>{ const el=$id('wVal'); if(el) el.focus(); },60);
  $id('wCancel').addEventListener('click',closeModal);
  $id('wSave').addEventListener('click',()=>{
    const v=parseFloat($id('wVal').value); if(!(v>0)){ toast('Enter a weight'); return; }
    const d=$id('wDate').value || todayKey();
    S.weights=(S.weights||[]).filter(w=>w.d!==d);   // one entry per day (upsert)
    S.weights.push({d, kg:dispToKg(v)});
    S.weights.sort((a,b)=> a.d<b.d?-1:1);
    save(); closeModal(); render(); toast('Weight logged');
  });
}

function renderPlan(){
  const planCost = S.plan.reduce((s,pl)=> s + entryCost(pl), 0);
  const mealEntries = S.plan.filter(pl=>(pl.type||'meal')==='meal');
  const otherEntries = S.plan.filter(pl=>(pl.type||'meal')!=='meal');
  const planServings = mealEntries.reduce((s,pl)=>s+(pl.servings||0),0);
  const pct = S.budget>0 ? Math.min(100, planCost/S.budget*100) : 0;
  const over = planCost>S.budget;

  const metaBits = [];
  if(mealEntries.length) metaBits.push(`${mealEntries.length} meal${mealEntries.length!==1?'s':''}`);
  if(otherEntries.length) metaBits.push(`${otherEntries.length} item${otherEntries.length!==1?'s':''}`);
  if(planServings>0) metaBits.push(`${planServings} serving${planServings!==1?'s':''}`);
  if(metaBits.length===0) metaBits.push('nothing planned yet');

  let html = `
    <div class="card summary">
      <div class="lab">This week's plan</div>
      <div class="big num">${money(planCost)}</div>
      <div class="meta">${metaBits.join(' · ')}</div>
      <div class="bbar ${over?'over':''}"><div style="width:${pct}%"></div></div>
      <div class="budline"><span>${over?'Over budget by '+money(planCost-S.budget):money(Math.max(0,S.budget-planCost))+' left'}</span><span class="num">budget ${money(S.budget)}</span></div>
    </div>`;

  html += `<div class="section-title"><h2>This week</h2><span class="grow"></span><button class="btn tiny ghost" id="addItemToPlan">+ Item</button><button class="btn tiny" id="addToPlan" style="margin-left:6px">+ Meal</button></div>`;

  if(S.plan.length===0){
    html += `<div class="card empty"><div class="big">🗓️</div><p>Nothing planned yet. Add a meal from your collection, or drop in a single item like a store-bought protein shake — both count toward your weekly cost.</p><button class="btn" id="addToPlan2">+ Add a meal</button></div>`;
  } else {
    html += `<div class="card">`;
    S.plan.forEach((pl,idx)=>{
      const type = pl.type||'meal';

        const m=meal(pl.mealId); if(!m) return;

        <div class="planrow">
          <div class="grow">
            <div class="pn">${esc(m.name)}</div>
            <div class="pm"><span class="num">${money(cps)}</span>/serving · ${money(cps*pl.servings)} total</div>
          </div>
          <div class="stepper" data-idx="${idx}">
            <button data-act="dec">−</button>
            <span class="n num">${pl.servings}</span>
            <button data-act="inc">+</button>
          </div>
          <button class="icon-btn danger" data-rmplan="${idx}" title="Remove">✕</button>
        </div>`;
      } else {
        const tag = type==='item' ? 'food' : 'item';
        const n = pl.count||1;
        html += `
        <div class="planrow">
          <div class="grow">
            <div class="pn">${esc(entryName(pl))} <span class="pill cat" style="font-size:10px">${tag}</span></div>
            <div class="pm">${esc(entryDetail(pl))}${n>1?` × ${n}`:''} · <span class="num">${money(entryCost(pl))}</span></div>
          </div>
          <div class="stepper" data-idx="${idx}">
            <button data-act="dec">−</button>
            <span class="n num">${n}</span>
            <button data-act="inc">+</button>
          </div>
          <button class="icon-btn" data-editplan="${idx}" title="Edit">✎</button>
          <button class="icon-btn danger" data-rmplan="${idx}" title="Remove">✕</button>
        </div>`;
      }
    });
    html += `</div>`;
    html += `<div style="margin-top:14px;text-align:center"><button class="btn ghost" id="goShop">View shopping list →</button></div>`;
  }

  html += renderWeightSection();

  if(!S.settings.hideEstimateNote){
    html += `<div class="note">ℹ️ <div><b>Prices and macros are starting estimates</b> (typical Coles, mid-2026). Supermarkets don't allow live price feeds, so tweak any item in the Pantry tab — set its pack size, price, nutrition amount (per 100 g, per serve, kcal or kJ) and everything recalculates instantly.<div style="margin-top:10px"><button class="btn tiny" id="dismissNote">OK, got it</button></div></div></div>`;
  }
  html += `<div style="text-align:center"><button class="danger-link" id="resetBtn">Reset all data</button> · <button class="danger-link" id="exportBtn" style="color:var(--muted)">Export / import</button></div>`;

  $view.innerHTML = html;

  on('#addToPlan,#addToPlan2','click',openPlanPicker);
  on('#addItemToPlan','click',()=>openPlanPicker('food'));
  on('#goShop','click',()=>{TAB='shop';render()});
  on('#resetBtn','click',confirmReset);
  on('#dismissNote','click',()=>{ S.settings.hideEstimateNote=true; save(); render(); });
  on('#exportBtn','click',openExport);
  on('#logWeight,#logWeight2','click',openWeightLog);
  $view.querySelectorAll('#wUnit [data-wu]').forEach(b=>b.addEventListener('click',()=>{ S.settings.weightUnit=b.dataset.wu; save(); render(); }));
  $view.querySelectorAll('[data-wdel]').forEach(b=>b.addEventListener('click',()=>{ const d=b.dataset.wdel; S.weights=(S.weights||[]).filter(w=>w.d!==d); save(); render(); }));
  $view.querySelectorAll('.stepper').forEach(st=>{
    const idx=+st.dataset.idx;
    st.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
      const act=b.dataset.act, e=S.plan[idx]; if(!e) return;
      const field = (e.type==='meal'||!e.type) ? 'servings' : 'count';
      e[field] = Math.max(1, (e[field]||1) + (act==='inc'?1:-1));
      save(); render();
    }));
  });
  $view.querySelectorAll('[data-editplan]').forEach(b=>b.addEventListener('click',()=>editPlanEntry(+b.dataset.editplan)));
  $view.querySelectorAll('[data-rmplan]').forEach(b=>b.addEventListener('click',()=>{
    S.plan.splice(+b.dataset.rmplan,1); save(); render();
  }));
}

function openPlanPicker(initial){
  const seg = initial==='food' ? 'food' : 'meal';

    <div class="seg-row" id="planSeg">
      <button class="seg ${seg==='meal'?'on':''}" data-pseg="meal">Meal</button>
      <button class="seg ${seg==='food'?'on':''}" data-pseg="food">Single food</button>
      <button class="seg ${seg==='custom'?'on':''}" data-pseg="custom">Quick item</button>
    </div>

  showModal('Add to this week', body);

  const bodyEl = ()=>document.getElementById('planPickBody');
  let favOnly=false;
  function paneMeal(){
    const favBtn = `<div style="margin-bottom:10px"><button class="favchip ${favOnly?'on':''}" id="planFav">${favOnly?'★':'☆'} Favourites</button></div>`;

      bodyEl().innerHTML = `<div class="card empty" style="box-shadow:none"><p>No meals yet. Create one in the Meals tab, or add a single food / quick item instead.</p></div>`;
      return;
    }
    const list = favOnly ? S.meals.filter(m=>m.fav) : S.meals;
    bodyEl().innerHTML = favBtn + (list.length
      ? `<div class="card" style="box-shadow:none">`+list.map(m=>`
        <div class="planrow" style="cursor:pointer" data-pickmeal="${m.id}">
          <div class="grow"><div class="pn">${m.fav?'★ ':''}${esc(m.name)}</div><div class="pm"><span class="pill cat">${esc(m.type)}</span> <span class="num">${money(mealPerServing(m))}</span>/serving · makes ${m.servings}</div></div>
          <span class="btn tiny">Add</span>
        </div>`).join('')+`</div>`

      resBox.innerHTML = list.length ? list.map(rowHtml).join('') : `<div style="padding:14px;color:var(--muted);font-size:13px">No matching ${favOnly?'favourite ':''}pantry items. ${favOnly?'Tap the ☆ on items in the Pantry tab.':'Add it in the Pantry tab first, or use "Quick item".'}</div>`;
      resBox.querySelectorAll('[data-pickfood]').forEach(el=>el.addEventListener('click',()=>{
        const p=item(el.dataset.pickfood);

        S.plan.push({type:'item', pid:p.id, qty:startQty, unit:p.unit, count:1}); save(); closeModal(); render();

  function paneCustom(){
    bodyEl().innerHTML = `

      <div class="row">
        <label class="field"><span class="lab">Energy (${energyUnit()})</span><input type="number" id="pcK" min="0" step="any" value="0" inputmode="decimal"></label>
        <label class="field"><span class="lab">Protein (g)</span><input type="number" id="pcP" min="0" step="any" value="0" inputmode="decimal"></label>
      </div>
      <div class="row">
        <label class="field"><span class="lab">Carbs (g)</span><input type="number" id="pcC" min="0" step="any" value="0" inputmode="decimal"></label>
        <label class="field"><span class="lab">Fat (g)</span><input type="number" id="pcF" min="0" step="any" value="0" inputmode="decimal"></label>
      </div>
      <button class="btn" id="pcAdd" style="width:100%;margin-top:10px">Add to week</button>`;
    document.getElementById('pcAdd').addEventListener('click',()=>{
      const name=document.getElementById('pcName').value.trim();
      if(!name){ toast('Name needed'); return; }
      S.plan.push({type:'custom', name,
        cost:Math.max(0,parseFloat(document.getElementById('pcCost').value)||0),
        kcal:fromDisp(parseFloat(document.getElementById('pcK').value)||0),
        p:parseFloat(document.getElementById('pcP').value)||0,
        c:parseFloat(document.getElementById('pcC').value)||0,
        f:parseFloat(document.getElementById('pcF').value)||0,
        count:1,
      });
      save(); closeModal(); render();
    });
  }
  const panes={meal:paneMeal,food:paneFood,custom:paneCustom};
  document.querySelectorAll('#planSeg [data-pseg]').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('#planSeg [data-pseg]').forEach(x=>x.classList.toggle('on',x===b));
    panes[b.dataset.pseg]();
  }));
  panes[seg]();
}

/* ---- TODAY (daily log) tab ---- */
const SLOTS=['Breakfast','Lunch','Dinner','Snack'];
let logDate=null;
function todayKey(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function shiftDay(key,delta){ const [y,m,d]=key.split('-').map(Number); const dt=new Date(y,m-1,d); dt.setDate(dt.getDate()+delta); return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'); }
function fmtDayLabel(key){
  const t=todayKey(); if(key===t) return 'Today';
  if(key===shiftDay(t,-1)) return 'Yesterday'; if(key===shiftDay(t,1)) return 'Tomorrow';
  const [y,m,d]=key.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'});
}
function defaultSlot(){ const h=new Date().getHours(); return h<11?'Breakfast':(h<15?'Lunch':(h<21?'Dinner':'Snack')); }

function entryMacros(e){
  if(e.type==='meal'){ const m=meal(e.mealId); if(!m) return {kcal:0,p:0,c:0,f:0}; const pm=mealMacrosPerServing(m); const s=e.servings||1; return {kcal:pm.kcal*s,p:pm.p*s,c:pm.c*s,f:pm.f*s}; }
  const n=e.count||1;
  if(e.type==='item'){ const mm=ingMacros({pid:e.pid,qty:e.qty,unit:e.unit}); return {kcal:mm.kcal*n,p:mm.p*n,c:mm.c*n,f:mm.f*n}; }
  return {kcal:(e.kcal||0)*n,p:(e.p||0)*n,c:(e.c||0)*n,f:(e.f||0)*n};
}
function entryCost(e){
  if(e.type==='meal'){ const m=meal(e.mealId); return m?mealPerServing(m)*(e.servings||1):0; }
  const n=e.count||1;
  if(e.type==='item'){ const p=item(e.pid); return p?toBase(e.qty,e.unit)*pricePerBase(p)*n:0; }
  return (e.cost||0)*n;
}
function entryName(e){
  if(e.type==='meal'){ const m=meal(e.mealId); return m?m.name:'(deleted meal)'; }
  if(e.type==='item'){ const p=item(e.pid); return p?p.name:'(deleted food)'; }
  return e.name||'Custom food';
}
function entryDetail(e){
  if(e.type==='meal'){ const s=e.servings||1; return (s===1?'1 serving':s+' servings'); }
  if(e.type==='item'){ return qtyStr(e.qty,e.unit); }
  return 'custom';
}
function dayEntries(key){ return S.log[key]||[]; }
function dayTotals(key){ return dayEntries(key).reduce((s,e)=>{const x=entryMacros(e);return{kcal:s.kcal+x.kcal,p:s.p+x.p,c:s.c+x.c,f:s.f+x.f,cost:s.cost+entryCost(e)}},{kcal:0,p:0,c:0,f:0,cost:0}); }

function macroStripDark(mac,T){
  T=T||{};
  const its=[['Protein',mac.p,T.p],['Carbs',mac.c,T.c],['Fat',mac.f,T.f]];
  return `<div style="display:flex;gap:6px">`+its.map(([l,v,t])=>`<div style="flex:1;text-align:center;background:rgba(255,255,255,.16);border-radius:8px;padding:7px 2px">
    <div class="num" style="font-weight:750;font-size:16px;color:#fff">${Math.round(v)}g${t>0?`<span style="font-size:10px;opacity:.8"> / ${Math.round(t)}</span>`:''}</div>
    <div style="font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;color:rgba(255,255,255,.85);font-weight:700">${l}</div></div>`).join('')+`</div>`;
}

function renderLog(){
  if(!logDate) logDate=todayKey();
  const key=logDate;
  const entries=dayEntries(key);
  const tot=dayTotals(key);
  const T=S.targets||{kcal:0,p:0,c:0,f:0};
  const isToday=key===todayKey();

  let html=`<div class="daynav">
    <button class="icon-btn" id="dPrev" title="Previous day">‹</button>
    <div class="daylabel"><div class="dl">${fmtDayLabel(key)}</div>${isToday?'':`<button class="btn tiny ghost" id="dToday" style="margin-top:4px">Jump to today</button>`}</div>
    <button class="icon-btn" id="dNext" title="Next day">›</button>
  </div>`;

  const kcalPct=T.kcal>0?Math.min(100,tot.kcal/T.kcal*100):0;
  const over=T.kcal>0 && tot.kcal>T.kcal;
  html+=`<div class="card summary">
    <div class="lab">${energyUnit()==='kJ'?'Energy':'Calories'} eaten</div>
    <div class="big num">${Math.round(toDisp(tot.kcal))}${T.kcal>0?` <span style="font-size:18px;opacity:.8;font-weight:600">/ ${Math.round(toDisp(T.kcal))}</span>`:''}</div>
    <div class="meta">${entries.length} item${entries.length!==1?'s':''} logged · ${money(tot.cost)} spent</div>
    ${T.kcal>0?`<div class="bbar ${over?'over':''}"><div style="width:${kcalPct}%"></div></div><div class="budline"><span>${over?Math.round(toDisp(tot.kcal-T.kcal))+' '+energyUnit()+' over':Math.round(toDisp(Math.max(0,T.kcal-tot.kcal)))+' '+energyUnit()+' left'}</span><span class="num">goal ${Math.round(toDisp(T.kcal))}</span></div>`:''}
    <div style="margin-top:13px">${macroStripDark(tot,T)}</div>
  </div>`;

  html+=`<div style="display:flex;gap:10px;margin:16px 0"><button class="btn" id="logAdd" style="flex:1">+ Log food</button><button class="btn subtle" id="setGoals">${T.kcal>0?'Edit goals':'Set goals'}</button></div>`;

  if(entries.length===0){
    html+=`<div class="card empty"><div class="big">🍽️</div><p>Nothing logged for ${isToday?'today':'this day'} yet. Log a meal you made, a food from your pantry, or a quick custom entry.</p><button class="btn" id="logAdd2">+ Log your first food</button></div>`;
  } else {
    SLOTS.forEach(slot=>{
      const list=entries.map((e,i)=>({e,i})).filter(x=>x.e.slot===slot);
      const sub=list.reduce((s,x)=>s+entryMacros(x.e).kcal,0);
      html+=`<div class="section-title" style="margin-top:14px"><h2>${slot}</h2><span class="grow"></span>${list.length?`<span class="num muted">${energyStr(sub)}</span>`:''}<button class="btn tiny ghost" data-addslot="${slot}" style="margin-left:8px">+</button></div>`;
      if(!list.length){ html+=`<div class="card" style="padding:10px 14px"><span class="muted" style="font-size:13px">Nothing yet</span></div>`; }
      else {
        html+=`<div class="card">`;
        list.forEach(({e,i})=>{ const mac=entryMacros(e); html+=`
          <div class="logitem">
            <div class="grow"><div class="lname">${esc(entryName(e))}</div><div class="lmeta">${esc(entryDetail(e))} · <span class="num">${energyStr(mac.kcal)} · ${Math.round(mac.p)}g P</span> · ${money(entryCost(e))}</div></div>
            <button class="icon-btn" data-editlog="${i}" title="Edit">✎</button>
            <button class="icon-btn danger" data-rmlog="${i}" title="Remove">✕</button>
          </div>`; });
        html+=`</div>`;
      }
    });
  }
  $view.innerHTML=html;
  on('#dPrev','click',()=>{ logDate=shiftDay(key,-1); render(); });
  on('#dNext','click',()=>{ logDate=shiftDay(key,1); render(); });
  on('#dToday','click',()=>{ logDate=todayKey(); render(); });
  on('#logAdd,#logAdd2','click',()=>openLogPicker(defaultSlot()));
  on('#setGoals','click',openTargets);
  $view.querySelectorAll('[data-addslot]').forEach(b=>b.addEventListener('click',()=>openLogPicker(b.dataset.addslot)));
  $view.querySelectorAll('[data-editlog]').forEach(b=>b.addEventListener('click',()=>editLogEntry(key,+b.dataset.editlog)));
  $view.querySelectorAll('[data-rmlog]').forEach(b=>b.addEventListener('click',()=>{ S.log[key].splice(+b.dataset.rmlog,1); if(!S.log[key].length) delete S.log[key]; save(); render(); }));
}

function addLogEntry(slot,type,id){
  const key=logDate; if(!S.log[key]) S.log[key]=[];
  if(type==='meal'){ S.log[key].push({id:uid(),type:'meal',mealId:id,servings:1,slot}); }
  else { const p=item(id); if(!p) return; const fam=familyOf(p.unit); const def=fam==='count'?{qty:1,unit:'each'}:(fam==='weight'?{qty:100,unit:'g'}:{qty:100,unit:'ml'}); S.log[key].push({id:uid(),type:'item',pid:id,qty:def.qty,unit:def.unit,slot}); }
  save(); render();
}

function openLogPicker(slot){
  let body=`<div class="seg-row" id="slotSeg">${SLOTS.map(s=>`<button class="seg ${s===slot?'on':''}" data-slot="${s}">${s}</button>`).join('')}</div>
    <div style="display:flex;gap:8px;align-items:center;margin:12px 0"><input type="text" id="logSearch" placeholder="Search meals & foods…" style="flex:1;margin:0"><button class="favchip" id="logFav">☆ Favourites</button></div>
    <div style="display:flex;gap:8px;margin-bottom:4px"><button class="btn ghost tiny" id="logCustom">+ Custom entry</button><button class="btn ghost tiny" id="logNewFood">+ New food</button></div>
    <div id="logList">`;
  if(S.meals.length){
    body+=`<div class="pill cat" style="margin:10px 0 4px">Your meals</div>`;
    S.meals.forEach(m=>{ const pm=mealMacrosPerServing(m); body+=`<div class="planrow logpick" data-type="meal" data-id="${m.id}" data-fav="${m.fav?1:0}" data-name="${esc(m.name.toLowerCase())}" style="cursor:pointer"><div class="grow"><div class="pn">${m.fav?'★ ':''}${esc(m.name)}</div><div class="pm num">${energyStr(pm.kcal)} · ${Math.round(pm.p)}g P / serving</div></div><span class="btn tiny">Add</span></div>`; });
  }
  body+=`<div class="pill cat" style="margin:12px 0 4px">Foods</div>`;
  S.pantry.forEach(p=>{ const kc=p.nutri?p.nutri.kcal:0; body+=`<div class="planrow logpick" data-type="item" data-id="${p.id}" data-fav="${p.fav?1:0}" data-name="${esc(p.name.toLowerCase())}" style="cursor:pointer"><div class="grow"><div class="pn">${p.fav?'★ ':''}${esc(p.name)}</div><div class="pm num">${energyStr(kc)} ${nutriBasisShort(p)}</div></div><span class="btn tiny">Add</span></div>`; });
  body+=`</div><div style="margin-top:14px"><button class="btn" id="logDone" style="width:100%">Done</button></div>`;
  showModal('Log to '+slot, body);
  let cur=slot, favOnly=false;
  const applyLog=()=>{ const q=(document.getElementById('logSearch').value||'').toLowerCase(); $modalQ('.logpick').forEach(el=>{ const okQ=el.dataset.name.includes(q); const okF=!favOnly||el.dataset.fav==='1'; el.style.display=(okQ&&okF)?'':'none'; }); };
  $modalQ('[data-slot]').forEach(b=>b.addEventListener('click',()=>{ cur=b.dataset.slot; $modalQ('[data-slot]').forEach(x=>x.classList.toggle('on',x.dataset.slot===cur)); const h=document.querySelector('.modal-head h3'); if(h) h.textContent='Log to '+cur; }));
  document.getElementById('logSearch').addEventListener('input',applyLog);
  document.getElementById('logFav').addEventListener('click',()=>{ favOnly=!favOnly; const b=document.getElementById('logFav'); b.classList.toggle('on',favOnly); b.textContent=(favOnly?'★':'☆')+' Favourites'; applyLog(); });
  $modalQ('.logpick').forEach(el=>el.addEventListener('click',()=>{ addLogEntry(cur, el.dataset.type, el.dataset.id); toast('Added to '+cur); }));
  document.getElementById('logCustom').addEventListener('click',()=>openCustomEntry(cur));
  document.getElementById('logNewFood').addEventListener('click',()=>openPantryEditor(null,()=>{ closeModal(); openLogPicker(cur); }));
  document.getElementById('logDone').addEventListener('click',()=>{ closeModal(); render(); });
}

    </div>
    <div class="row">
      <label class="field"><span class="lab">Carbs (g)</span><input type="number" id="cC" min="0" step="any" value="0" inputmode="decimal"></label>
      <label class="field"><span class="lab">Fat (g)</span><input type="number" id="cF" min="0" step="any" value="0" inputmode="decimal"></label>

function editLogEntry(key,idx){
  const e=S.log[key][idx]; if(!e) return;
  let fields='';
  if(e.type==='meal'){ const m=meal(e.mealId); fields=`<label class="field"><span class="lab">Servings of "${esc(m?m.name:'meal')}"</span><input type="number" id="eServ" min="0" step="0.25" value="${e.servings||1}" inputmode="decimal"></label>`; }
  else if(e.type==='item'){ const p=item(e.pid); const fam=p?familyOf(p.unit):'weight'; const uo=FAMILY_UNITS[fam].map(u=>`<option value="${u}" ${u===e.unit?'selected':''}>${UNITS[u].label}</option>`).join(''); fields=`<label class="field"><span class="lab">Amount of "${esc(p?p.name:'food')}"</span><div class="row"><input type="number" id="eQty" min="0" step="any" value="${e.qty}" inputmode="decimal"><select id="eUnit" style="max-width:96px">${uo}</select></div></label>`; }
  else { fields=`<label class="field"><span class="lab">Name</span><input type="text" id="eName" value="${esc(e.name||'')}"></label>
    <div class="row"><label class="field"><span class="lab">Energy (${energyUnit()})</span><input type="number" id="eK" value="${+toDisp(e.kcal||0).toFixed(2)}" inputmode="decimal"></label><label class="field"><span class="lab">Protein (g)</span><input type="number" id="eP" value="${e.p||0}" inputmode="decimal"></label></div>
    <div class="row"><label class="field"><span class="lab">Carbs (g)</span><input type="number" id="eC" value="${e.c||0}" inputmode="decimal"></label><label class="field"><span class="lab">Fat (g)</span><input type="number" id="eF" value="${e.f||0}" inputmode="decimal"></label></div>
    <label class="field"><span class="lab">Cost</span><input type="number" id="eCost" value="${e.cost||0}" inputmode="decimal"></label>`; }
  const body=`<div class="seg-row">${SLOTS.map(s=>`<button class="seg ${s===e.slot?'on':''}" data-eslot="${s}">${s}</button>`).join('')}</div>
    <div style="margin-top:14px">${fields}</div>
    <div style="display:flex;gap:10px;margin-top:6px"><button class="btn" id="eDel" style="flex:1;border:1px solid var(--danger);color:var(--danger);background:var(--danger-soft)">Remove</button><button class="btn" id="eSave" style="flex:2">Save</button></div>`;
  showModal('Edit entry', body);
  let es=e.slot;
  $modalQ('[data-eslot]').forEach(b=>b.addEventListener('click',()=>{ es=b.dataset.eslot; $modalQ('[data-eslot]').forEach(x=>x.classList.toggle('on',x.dataset.eslot===es)); }));
  $id('eDel').addEventListener('click',()=>{ S.log[key].splice(idx,1); if(!S.log[key].length) delete S.log[key]; save(); closeModal(); render(); });
  $id('eSave').addEventListener('click',()=>{
    e.slot=es;
    if(e.type==='meal'){ const v=parseFloat($id('eServ').value); e.servings=(v&&v>0)?v:1; }
    else if(e.type==='item'){ e.qty=Math.max(0,parseFloat($id('eQty').value)||0); e.unit=$id('eUnit').value; }
    else { e.name=$id('eName').value.trim()||e.name; e.kcal=fromDisp(parseFloat($id('eK').value)||0); e.p=parseFloat($id('eP').value)||0; e.c=parseFloat($id('eC').value)||0; e.f=parseFloat($id('eF').value)||0; e.cost=parseFloat($id('eCost').value)||0; }
    save(); closeModal(); render();
  });
}

function renderMeals(){
  let html = `<div class="section-title"><h2>My meals</h2><span class="count">${S.meals.length}</span><span class="grow"></span><button class="btn tiny" id="newMeal">+ New meal</button></div>`;
  if(S.meals.length===0){
    html += `<div class="card empty"><div class="big">🍲</div><p>No meals yet. Create one, add ingredients with quantities and a serving count, and Pantry will show you the cost per serving.</p><button class="btn" id="newMeal2">+ Create your first meal</button></div>`;
  } else {
    S.meals.forEach(m=>{
      const total=mealTotal(m), cps=mealPerServing(m);
      html += `
      <div class="card meal">
        <div class="meal-top">
          <div class="grow">
            <div class="meal-name"><button class="starbtn ${m.fav?'on':''}" data-favmeal="${m.id}" title="Favourite" aria-label="Favourite">${m.fav?'★':'☆'}</button> ${esc(m.name)}</div>
            <div class="meal-meta"><span class="pill cat">${esc(m.type)}</span> &nbsp;${(m.ings||[]).length} ingredient${(m.ings||[]).length!==1?'s':''} · makes ${m.servings} · ${money(total)} total</div>

        </div>
        ${hasMacros(m)?`<div class="num" style="margin-top:9px;font-size:12px;color:var(--muted)">${macroLine(mealMacrosPerServing(m))} · per serving</div>`:''}
        <div style="display:flex; gap:8px; margin-top:12px">
          <button class="btn subtle tiny" data-editmeal="${m.id}">✎ Edit</button>
          <button class="btn subtle tiny" data-dupmeal="${m.id}">⧉ Duplicate</button>
          <button class="btn subtle tiny" data-addmealplan="${m.id}">+ Add to week</button>
          <button class="icon-btn danger right" data-delmeal="${m.id}" title="Delete">🗑</button>
        </div>
      </div>`;
    });

  $view.innerHTML = html;
  on('#newMeal,#newMeal2','click',()=>openMealEditor(null));
  $view.querySelectorAll('[data-favmeal]').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); const m=meal(b.dataset.favmeal); m.fav=!m.fav; save(); render(); }));
  $view.querySelectorAll('[data-editmeal]').forEach(b=>b.addEventListener('click',()=>openMealEditor(b.dataset.editmeal)));
  $view.querySelectorAll('[data-delmeal]').forEach(b=>b.addEventListener('click',()=>{
    const m=meal(b.dataset.delmeal); if(!m) return;
    showConfirm({title:'Delete meal?', message:'Delete "'+esc(m.name)+'"? This also removes it from your week.', yes:'Delete', danger:true, onYes:()=>{
      S.meals=S.meals.filter(x=>x.id!==m.id);
      S.plan=S.plan.filter(p=>p.mealId!==m.id);
      save(); render();
    }});
  }));
  $view.querySelectorAll('[data-dupmeal]').forEach(b=>b.addEventListener('click',()=>{
    const m=clone(meal(b.dataset.dupmeal)); m.id=uid(); m.name=m.name+' (copy)';
    S.meals.push(m); save(); render();
  }));
  $view.querySelectorAll('[data-addmealplan]').forEach(b=>b.addEventListener('click',()=>{
    const m=meal(b.dataset.addmealplan);
    S.plan.push({type:'meal', mealId:m.id, servings:m.servings}); save(); toast('Added to this week'); 
  }));
}

let draft=null; // meal being edited
function openMealEditor(mid){
  draft = mid ? clone(meal(mid)) : {id:uid(), name:'', type:'Dinner', servings:4, notes:'', ings:[]};
  renderMealEditor(!mid);
}
// read text/select inputs into draft (numbers are kept live by their own listeners)
function syncMealDraft(){
  if($id('mName')) draft.name=$id('mName').value;
  if($id('mType')) draft.type=$id('mType').value;
  if($id('mNotes')) draft.notes=$id('mNotes').value;
  if($id('mServ')){ const sv=parseInt($id('mServ').value); draft.servings=(sv&&sv>0)?sv:1; }
}
// recompute and write only the derived figures — never rebuilds inputs, so focus/cursor stay put
function updMealCalc(){
  $modalQ('[data-cost]').forEach(el=>{ const i=+el.dataset.cost; if(draft.ings[i]) el.textContent=money(ingCost(draft.ings[i])); });
  const total=mealTotal(draft);
  if($id('mTotal')) $id('mTotal').textContent=money(total)+' total';
  const svRaw=parseInt(($id('mServ')||{value:''}).value); const d=(svRaw&&svRaw>0)?svRaw:1;
  if($id('mCps')) $id('mCps').textContent=money(total/d);
  const mac=mealMacros(draft);
  if($id('mMacros')) $id('mMacros').innerHTML=macroStrip({kcal:mac.kcal/d,p:mac.p/d,c:mac.c/d,f:mac.f/d});
}
function renderMealEditor(isNew){
  const m=draft;
  const typeOpts = MEALTYPES.map(t=>`<option ${t===m.type?'selected':''}>${t}</option>`).join('');
  let ingHtml = (m.ings||[]).map((ing,i)=>{
    const p=item(ing.pid);
    const fam = p?familyOf(p.unit):'weight';
    const unitOpts = FAMILY_UNITS[fam].map(u=>`<option value="${u}" ${u===ing.unit?'selected':''}>${UNITS[u].label}</option>`).join('');
    return `<div class="ing-row" data-i="${i}">
      <span class="nm">${esc(p?p.name:'(deleted item)')}</span>
      <input class="qty num" type="number" min="0" step="any" value="${ing.qty}" data-q="${i}" inputmode="decimal">
      <select class="un" data-u="${i}">${unitOpts}</select>
      <span class="cost num" data-cost="${i}">${money(ingCost(ing))}</span>
      <button class="icon-btn danger" data-rming="${i}" title="Remove">✕</button>
    </div>`;
  }).join('');
  if(!(m.ings||[]).length) ingHtml = `<div class="muted" style="padding:10px 0;font-size:13px">No ingredients yet — add from your pantry below.</div>`;

  const body = `
    <label class="field"><span class="lab">Meal name</span><input type="text" id="mName" value="${esc(m.name)}" placeholder="e.g. Beef stir-fry"></label>
    <div class="row">
      <label class="field"><span class="lab">Type</span><select id="mType">${typeOpts}</select></label>
      <label class="field"><span class="lab">Servings this recipe makes</span><input type="number" id="mServ" min="1" step="1" value="${m.servings}" inputmode="numeric"></label>
    </div>
    <div class="section-title" style="margin-top:6px"><h2>Ingredients</h2><span class="grow"></span><span class="num muted" id="mTotal"></span></div>
    <div class="card" style="box-shadow:none;padding:4px 12px">${ingHtml}</div>
    <div style="margin-top:10px"><button class="btn ghost tiny" id="addIng">+ Add ingredient</button></div>
    <label class="field" style="margin-top:14px"><span class="lab">Notes (optional)</span><input type="text" id="mNotes" value="${esc(m.notes||'')}" placeholder="Cooking notes, link…"></label>
    <div class="card" style="background:var(--primary-soft);border-color:var(--border-strong);padding:13px 16px">
      <div style="display:flex;align-items:center">
        <div class="l" style="font-size:11px;color:var(--primary-dark);font-weight:700;text-transform:uppercase;letter-spacing:.05em">Per serving</div>
        <div class="num" id="mCps" style="margin-left:auto;font-size:24px;font-weight:780;color:var(--primary-dark)"></div>
      </div>
      <div id="mMacros" style="margin-top:11px"></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="btn subtle" id="cancelMeal" style="flex:1">Cancel</button>
      <button class="btn" id="saveMeal" style="flex:2">${isNew?'Create meal':'Save changes'}</button>
    </div>`;
  showModal(isNew?'New meal':'Edit meal', body);
  updMealCalc();

  // live edits update figures only — inputs are never re-rendered, so typing is smooth
  $id('mServ').addEventListener('input', updMealCalc);
  $modalQ('[data-q]').forEach(inp=>inp.addEventListener('input',()=>{
    draft.ings[+inp.dataset.q].qty=parseFloat(inp.value)||0; updMealCalc();
  }));
  $modalQ('[data-u]').forEach(sel=>sel.addEventListener('change',()=>{
    draft.ings[+sel.dataset.u].unit=sel.value; updMealCalc();
  }));
  $modalQ('[data-rming]').forEach(b=>b.addEventListener('click',()=>{
    syncMealDraft(); draft.ings.splice(+b.dataset.rming,1); renderMealEditor(isNew);
  }));
  $id('addIng').addEventListener('click',()=>{ syncMealDraft(); openIngPicker(isNew); });
  $id('cancelMeal').addEventListener('click',closeModal);
  $id('saveMeal').addEventListener('click',()=>{
    syncMealDraft();
    if(!draft.name.trim()){ toast('Give the meal a name'); return; }
    const ix=S.meals.findIndex(x=>x.id===draft.id);
    if(ix>=0) S.meals[ix]=draft; else S.meals.push(draft);
    save(); closeModal(); render();
  });
}
function openIngPicker(isNew){
  const byCat={};
  S.pantry.forEach(p=>{(byCat[p.cat]=byCat[p.cat]||[]).push(p)});
  let html=`<input type="text" id="ingSearch" placeholder="Search pantry…" style="margin-bottom:12px">
    <div style="text-align:center;margin-bottom:12px"><button class="btn ghost tiny" id="quickNew">+ New pantry item</button></div>
    <div id="ingList">`;
  CATEGORIES.forEach(c=>{
    if(!byCat[c]) return;
    html+=`<div class="pill cat" style="margin:8px 0 4px">${c}</div>`;
    byCat[c].forEach(p=>{
      html+=`<div class="planrow ingpick" data-pick="${p.id}" data-name="${esc(p.name.toLowerCase())}" style="cursor:pointer">
        <div class="grow"><div class="pn">${esc(p.name)}</div><div class="pm"><span class="num">${money(p.price)}</span> / ${qtyStr(p.size,p.unit)}</div></div>
        <span class="btn tiny">Add</span></div>`;
    });
  });
  html+=`</div>`;
  showModal('Add ingredient', html);
  document.getElementById('quickNew').addEventListener('click',()=>{ openPantryEditor(null, (newItem)=>{ addIngToDraft(newItem.id); closeModal(); renderMealEditor(isNew); }); });
  const doPick=pid=>{ addIngToDraft(pid); closeModal(); renderMealEditor(isNew); };
  document.querySelectorAll('.ingpick').forEach(el=>el.addEventListener('click',()=>doPick(el.dataset.pick)));
  document.getElementById('ingSearch').addEventListener('input',e=>{
    const q=e.target.value.toLowerCase();
    document.querySelectorAll('.ingpick').forEach(el=>{ el.style.display = el.dataset.name.includes(q)?'':'none'; });
  });
}
function addIngToDraft(pid){
  const p=item(pid); if(!p) return;
  if(draft.ings.some(i=>i.pid===pid)){ toast('Already added'); return; }
  // start at the full pack size in the pack's own unit (e.g. 500 g pasta, 1.3 kg roast)
  const startQty = p.size>0 ? p.size : (familyOf(p.unit)==='count'?1:100);
  draft.ings.push({pid, qty: startQty, unit: p.unit});
}

/* ---- PANTRY tab ---- */

  if(S.pantry.length===0){
