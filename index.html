  CATEGORIES.forEach(c=>{
    if(!byCat[c]) return;
    html+=`<div data-catblock><div class="pill cat" style="margin:14px 0 6px">${c}</div><div class="card">`;
    byCat[c].forEach(p=>{
      const ppb=pricePerBase(p);
      const fam=familyOf(p.unit);
      const perLabel = fam==='count' ? `${money(ppb)}/ea` : (fam==='weight'? `${money(ppb*1000)}/kg` : `${money(ppb*1000)}/L`);
      const onHand = p.onHand>0 ? `· ${qtyStr(p.onHand,p.unit)} on hand` : '';
      const kc = (p.nutri&&p.nutri.kcal>0) ? `· ${energyStr(p.nutri.kcal)}${nutriBasisShort(p)}` : '';
      html+=`<div class="pitem" data-name="${esc(p.name.toLowerCase())}">
        <button class="starbtn ${p.fav?'on':''}" data-favitem="${p.id}" title="Favourite" aria-label="Favourite">${p.fav?'★':'☆'}</button>
        <div class="grow">
          <div class="pname">${esc(p.name)}</div>
          <div class="pmeta">${qtyStr(p.size,p.unit)} pack ${onHand} ${kc}</div>
        </div>
        <div class="punit"><div class="pp num">${money(p.price)}</div><div class="pu num">${perLabel}</div></div>
        <button class="icon-btn" data-editp="${p.id}" title="Edit">✎</button>
      </div>`;
    });
    html+=`</div></div>`;
  });
  html+=`<div id="pEmpty" class="card empty" style="display:none"><div class="big">🔍</div><p>No items match that search.</p></div>`;
  $view.innerHTML=html;
  on('#newItem','click',()=>openPantryEditor(null));
  on('#scanItem','click',openBarcodeScanner);
  $view.querySelectorAll('[data-editp]').forEach(b=>b.addEventListener('click',()=>openPantryEditor(b.dataset.editp)));
  $view.querySelectorAll('[data-favitem]').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); const p=item(b.dataset.favitem); p.fav=!p.fav; save(); render(); }));
  // filter in place — no re-render, so the cursor stays in the box
  document.getElementById('pSearch').addEventListener('input',e=>{
    const q=e.target.value.toLowerCase(); let anyVisible=false;
    $view.querySelectorAll('[data-catblock]').forEach(block=>{
      let vis=0;
      block.querySelectorAll('.pitem').forEach(it=>{ const show=it.dataset.name.includes(q); it.style.display=show?'':'none'; if(show)vis++; });
      block.style.display=vis?'':'none'; if(vis)anyVisible=true;
    });
    document.getElementById('pEmpty').style.display=anyVisible?'none':'';
  });
}

/* ---- Open Food Facts food lookup ----
   Free, no key needed. Works once the app is hosted or on your phone;
   it can't reach the network from inside the Claude preview sandbox. */
function offNum(v){ const n=parseFloat(v); return isFinite(n)?n:null; }
function offParseQuantity(q){
  if(!q || typeof q!=='string') return {};
  const m = q.replace(',','.').match(/([\d.]+)\s*(kg|mg|g|ml|cl|l)\b/i);
  if(!m) return {};
  let n=parseFloat(m[1]); let u=m[2].toLowerCase();
  if(u==='mg'){ n=n/1000; u='g'; }
  if(u==='cl'){ n=n*10; u='ml'; }
  const map={g:'g',kg:'kg',ml:'ml',l:'L'};
  return map[u] ? {size:n, unit:map[u]} : {};
}
function offNormalize(prod){
  const nut = prod.nutriments||{};
  let kcal = offNum(nut['energy-kcal_100g']);
  let kj = offNum(nut['energy-kj_100g']) ?? offNum(nut['energy_100g']);
  if(kcal==null && kj!=null) kcal = kj/KJ_PER_KCAL;
  if(kj==null && kcal!=null) kj = kcal*KJ_PER_KCAL;
  const q = offParseQuantity(prod.quantity);
  const name = (prod.product_name||'').trim();
  const out = {
    name,
    brand: (prod.brands||'').split(',')[0].trim(),
    p: offNum(nut.proteins_100g)||0,
    c: offNum(nut.carbohydrates_100g)||0,
    f: offNum(nut.fat_100g)||0,
    basisAmt: 100,
    packSize: q.size, packUnit: q.unit,
  };
  if(kcal!=null) out.kcal=kcal;
  if(kj!=null) out.kj=kj;
  return out;
}
async function offSearchFetch(query){
  const url = 'https://world.openfoodfacts.org/cgi/search.pl?search_terms='+encodeURIComponent(query)
    +'&search_simple=1&action=process&json=1&page_size=24&fields=code,product_name,brands,quantity,nutriments';
  const res = await fetch(url);
  if(!res.ok) throw new Error('http '+res.status);
  const data = await res.json();
  return (data.products||[]).map(offNormalize).filter(x=>x.name);
}
async function offFetchByBarcode(code){
  const url='https://world.openfoodfacts.org/api/v2/product/'+encodeURIComponent(code)+'.json?fields=product_name,brands,quantity,nutriments';
  const res=await fetch(url); if(!res.ok) throw new Error('http'); const data=await res.json();
  if(data.status!==1 || !data.product) return null;
  return offNormalize(data.product);
}

/* ---- Barcode scanner ----
   Reads a product barcode with the camera (via the ZXing library, loaded from a
   CDN) and looks it up on Open Food Facts. Needs a camera + internet, so it runs
   on the hosted site / phone, not inside the Claude preview. Fails gracefully. */
let zxingPromise=null;
function loadZXing(){
  if(window.ZXing) return Promise.resolve(window.ZXing);
  if(zxingPromise) return zxingPromise;
  zxingPromise=new Promise((resolve,reject)=>{
    const sc=document.createElement('script');
    sc.src='https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js';
    sc.onload=()=> window.ZXing ? resolve(window.ZXing) : reject(new Error('zxing'));
    sc.onerror=()=>reject(new Error('load'));
    document.head.appendChild(sc);
  });
  return zxingPromise;
}
function openBarcodeScanner(){
  showModal('Scan a barcode', `
    <p class="muted" style="font-size:13px;margin-top:0">Point your camera at the product barcode. Needs camera access, so it works on your phone or hosted site (not inside the in-app preview).</p>
    <div style="position:relative;border-radius:12px;overflow:hidden;background:#000;aspect-ratio:4/3"><video id="scanVid" playsinline muted autoplay style="width:100%;height:100%;object-fit:cover"></video></div>
    <div id="scanStatus" style="font-size:12.5px;color:var(--muted);margin:10px 2px 0;min-height:16px">Starting camera…</div>
    <div style="margin-top:12px"><button class="btn subtle" id="scanCancel" style="width:100%">Cancel</button></div>`);
  const video=$id('scanVid'), status=$id('scanStatus');
  let reader=null, done=false;
  const cleanup=()=>{ try{ reader && reader.reset && reader.reset(); }catch(e){} const s=video&&video.srcObject; if(s&&s.getTracks) s.getTracks().forEach(t=>t.stop()); };
  $id('scanCancel').addEventListener('click',()=>{ cleanup(); closeModal(); });
  (async()=>{
    let ZX;
    try{ ZX = await loadZXing(); }
    catch(e){ status.textContent='Couldn\u2019t load the scanner here — it works on your hosted site / phone. You can add the item by hand instead.'; return; }
    try{
      reader=new ZX.BrowserMultiFormatReader();
      status.textContent='Point at the barcode…';
      await reader.decodeFromVideoDevice(undefined, video, async (result)=>{
        if(done || !result) return;
        done=true;
        const code = result.getText ? result.getText() : (result.text||String(result));
        cleanup();
        status.textContent='Looking up '+code+'…';
        let food=null; try{ food=await offFetchByBarcode(code); }catch(e){}
        closeModal();
        openPantryEditor(null, false, food || {name:''});
        if(!food) toast('Barcode '+code+' not found — fill it in by hand');
      });
    }catch(e){
      status.textContent = (e && e.name==='NotAllowedError')
        ? 'Camera permission was blocked — allow it in your browser settings.'
        : 'Couldn\u2019t start the camera here. Try on your phone or hosted site.';
    }
  })();
}
function openFoodSearch(onPick){
  showModal('Search Open Food Facts', `
    <input type="text" id="offQ" placeholder="🔍  Search foods, e.g. protein shake" autocomplete="off">
    <div id="offStatus" style="font-size:12.5px;color:var(--muted);margin:10px 2px 0"></div>
    <div id="offResults" style="margin-top:8px;max-height:360px;overflow:auto"></div>`, true);
  const q=$id('offQ'), status=$id('offStatus'), res=$id('offResults');
  status.textContent = 'Type a product name. Data comes from the free Open Food Facts community database.';
  let timer=null, token=0;
  const run=async()=>{
    const term=q.value.trim();
    res.innerHTML='';
    if(term.length<2){ status.textContent='Keep typing…'; return; }
    const my=++token; status.textContent='Searching…';
    try{
      const list = await offSearchFetch(term);
      if(my!==token) return; // a newer search superseded this one
      if(!list.length){ status.textContent='No matches. Try a different name, or just fill it in manually.'; return; }
      status.textContent = list.length+' result'+(list.length!==1?'s':'')+' — tap one to fill the form.';
      res.innerHTML = `<div class="card" style="box-shadow:none;padding:4px">`+list.map((f,i)=>`
        <div class="planrow offres" data-i="${i}" style="cursor:pointer;padding:9px 10px;border:0">
          <div class="grow"><div class="pn">${esc(f.name)}${f.brand?` <span class="muted" style="font-weight:500">· ${esc(f.brand)}</span>`:''}</div>
          <div class="pm num">${energyStr(f.kcal)} / 100g · ${Math.round(f.p)}P ${Math.round(f.c)}C ${Math.round(f.f)}F</div></div>
          <span class="btn tiny">Use</span></div>`).join('')+`</div>`;
      res.querySelectorAll('.offres').forEach(el=>el.addEventListener('click',()=>{ onPick(list[+el.dataset.i]); closeModal2(); }));
    }catch(e){
      if(my!==token) return;
      status.innerHTML = `Couldn't reach Open Food Facts. This works once the app is hosted or running on your phone — inside the Claude preview the network is blocked. You can still fill the item in by hand.`;
    }
  };
  q.addEventListener('input',()=>{ if(timer)clearTimeout(timer); timer=setTimeout(run,350); });
  q.focus();
}

/* ---- Voice fill: say a food + its numbers and parse into fields ----
   The parser is fully offline. The live mic uses the Web Speech API (works in
   Chrome/Edge and mobile Safari); where it's unavailable — e.g. a home-screen
   PWA on iOS — the editable box lets you dictate with the keyboard's own mic. */
/* Detects a pasted multi-line nutrition information panel (the AU/NZ NIP with
   "Per Serving" / "Per 100g" columns) and reads it line by line. Prefers the
   per-100g column to match the app's per-100 basis, skips %DI lines and
   untracked rows (saturated fat, sugars, fibre, sodium), and works out the pack
   size from servings-per-package × serving-size. */
function looksLikeLabel(raw){
  const lines = raw.split(/\n/).filter(x=>x.trim()).length;
  return lines>=4 && /(per\s*100|per\s*serv|%\s*di|servings?\s*per|serving\s*size|energy\s*\()/i.test(raw);
}
function parseNutritionLabel(text){
  const out={};
  const pm = text.match(/\$\s*(\d+(?:\.\d+)?)/) || text.match(/(\d+(?:\.\d+)?)\s*(?:dollars?|bucks?)\b/i) || text.match(/(?:price|cost)s?\b[:\s]*\$?\s*(\d+(?:\.\d+)?)/i);
  if(pm) out.price=parseFloat(pm[1]);
  const lines = text.split(/\n/).map(l=>l.trim()).filter(Boolean);
  const fieldOf = label=>{
    const l=label.toLowerCase();
    if(/%/.test(l)) return null;
    if(/energy/.test(l) && /kj/.test(l)) return 'KJ';
    if(/energy/.test(l) && /(cal|calorie)/.test(l)) return 'CAL';
    if(/protein/.test(l)) return 'PROTEIN';
    if(/satur|trans|monoun|polyun/.test(l)) return null;   // skip fat sub-rows
    if(/\bfat\b/.test(l)) return 'FAT';
    if(/sugar|fibre|fiber|sodium|salt|gluten|cholesterol|calcium|iron|potassium/.test(l)) return null;
    if(/carbohydrate|carbs/.test(l)) return 'CARB';
    return null;
  };
  const has100 = /per\s*100/i.test(text);
  const numUnit = s=>{ const m=s.match(/(\d+(?:\.\d+)?)\s*(kg|mg|g|ml|cl|l)?/i); return m?{val:parseFloat(m[1]), unit:(m[2]||'').toLowerCase()}:null; };
  let servAmt=null, servUnit='', servings=null, current=null;
  const vals={}; const nameCands=[];
  for(const l of lines){
    const low=l.toLowerCase();
    if(/%/.test(l) || /\bdi\b/.test(low) || /\bri\b/.test(low)) continue;          // %DI / %RI rows
    if(/^per\s*(serving|serve|100|pack)/i.test(l)) continue;                         // column headers
    if(/servings?\s*per\s*(package|pack|container|pkg)/i.test(low)){ const m=l.match(/(\d+(?:\.\d+)?)/); if(m) servings=parseFloat(m[1]); current=null; continue; }
    if(/serving\s*size/i.test(low)){ const nu=numUnit(l.replace(/.*serving\s*size/i,'')); if(nu){ servAmt=nu.val; servUnit=nu.unit; } current=null; continue; }
    if(/^\(?\s*\d/.test(l)){                                                          // a value line
      if(current){ const m=l.match(/(\d+(?:\.\d+)?)/); if(m) (vals[current]=vals[current]||[]).push(parseFloat(m[1])); }
      continue;
    }
    const f=fieldOf(l);
    if(f){ current=f; if(!(f in vals)) vals[f]=[];
      const nums=l.replace(/^[^0-9]*/,'').match(/\d+(?:\.\d+)?/g);   // values on the same line as the name (combined-column labels)
      if(nums) nums.forEach(n=>vals[f].push(parseFloat(n)));
    }
    else { current=null; if(/[a-z]/i.test(l) && !/fat|protein|carb|energy|sugar|fibre|fiber|sodium|salt|satur|trans|\bkj\b|\bcal\b|kcal|kilojoule|calorie|serving|\bper\b|gluten|cholesterol|calcium|iron|potassium|nutrition|information|panel|quantity|average|typical|ingredient|allergen|\bmade\b|contains|store|manufactured|distributed|\bnet\b|%|\bdi\b/i.test(low)) nameCands.push(l); }
  }
  const pick = arr => (arr && arr.length) ? arr[arr.length-1] : null;   // per-100g is the last value listed
  const kj=pick(vals.KJ), cal=pick(vals.CAL), p=pick(vals.PROTEIN), f=pick(vals.FAT), c=pick(vals.CARB);
  if(kj!=null) out.kj=kj;
  if(cal!=null) out.kcal=cal;
  if(p!=null) out.p=p;
  if(f!=null) out.f=f;
  if(c!=null) out.c=c;
  // basis: prefer the per-100 column; otherwise the serving size
  if(has100 || (vals.PROTEIN&&vals.PROTEIN.length>1) || servAmt==null){ out.basisAmt=100; out.basisUnit = servUnit==='ml'?'ml':'g'; }
  else { out.basisAmt=servAmt; out.basisUnit = servUnit==='ml'?'ml':'g'; }
  // pack size = servings × serving size
  if(servings>0 && servAmt>0){
    const u = servUnit==='l'?'L':(['g','kg','ml'].includes(servUnit)?servUnit:'g');
    out.packSize = Math.round(servings*servAmt*100)/100; out.packUnit = u;
  }
  let nm = (nameCands.sort((a,b)=>b.length-a.length)[0] || '');
  nm = nm.replace(/\$\s*\d+(?:\.\d+)?/g,'').replace(/\b\d+(?:\.\d+)?\s*(?:dollars?|bucks?)\b/ig,'').replace(/\b(?:price|cost)s?\b[:\s]*\$?\s*\d+(?:\.\d+)?/ig,'').replace(/[,:;]+/g,' ').replace(/\s+/g,' ').trim();
  if(nm) out.name = nm.replace(/\b([a-z])/g,c=>c.toUpperCase());
  return out;
}

/* Tokenises the text into numbers, labels (calories, protein, size, …) and
   plain words, then ties each number to the label right next to it. Everything
   left over becomes the name. Handles "protein 20" and "20 g protein" and glued
   forms like "100cal" / "20p" / "1f" / "1carb", labels before or after the
   number ("size 500g" or "1.6kg pack"), "$11" prices, and keeps "5%" in the name. */
function parseFoodSpeech(raw){
  if(!raw) return {};
  if(looksLikeLabel(raw)) return parseNutritionLabel(raw);
  let s = ' '+String(raw).toLowerCase().replace(/[,;]/g,' ').replace(/\s+/g,' ')+' ';
  s = s.replace(/\bper cent\b|\bpercent\b/g,'%')
       .replace(/\b(serving size|serve size|per serving|per serve)\b/g,'servingsize')
       .replace(/\b(pack size|net weight|net wt)\b/g,'packsize');

  const KW = { servingsize:'BASIS', serving:'BASIS', per:'BASIS', basis:'BASIS',
    packsize:'PACK', pack:'PACK', packet:'PACK', size:'PACK', weight:'PACK',
    kj:'KJ', kjs:'KJ', kilojoules:'KJ', kilojoule:'KJ',
    kcal:'CAL', kcals:'CAL', calories:'CAL', calorie:'CAL', cal:'CAL', cals:'CAL', kilocalories:'CAL', kilocalorie:'CAL', energy:'CAL',
    protein:'PROTEIN', proteins:'PROTEIN', prot:'PROTEIN',
    carbs:'CARB', carb:'CARB', carbohydrate:'CARB', carbohydrates:'CARB',
    fat:'FAT', fats:'FAT',
    price:'PRICE', priced:'PRICE', cost:'PRICE', costs:'PRICE', dollars:'PRICE', dollar:'PRICE', bucks:'PRICE', buck:'PRICE' };
  const SUF = Object.assign({}, KW, {p:'PROTEIN', f:'FAT', c:'CARB'});   // single-letter macros, only when glued to a number
  const UNITW = {g:'g',kg:'kg',mg:'mg',ml:'ml',cl:'cl',l:'l',grams:'g',gram:'g',kilograms:'kg',kilogram:'kg',kilos:'kg',kilo:'kg',millilitres:'ml',milliliters:'ml',mls:'ml',litres:'l',liters:'l',litre:'l',liter:'l'};
  const FILLER = new Set(['of','is','are','a','an','the','and','with','it','its','approx','approximately','about','around','roughly','at','for','each','to','has','have','this','that']);

  const toks=[]; const re=/(\$)?(\d+(?:\.\d+)?)([a-z]+|%)?|[a-z][a-z]*/gi; let m;
  while((m=re.exec(s))){
    if(m[2]!=null){
      const val=parseFloat(m[2]); const price=m[1]==='$'; let suf=(m[3]||'').toLowerCase();
      if(suf==='%'){ toks.push({t:'num',percent:true,raw:m[2]+'%'}); continue; }
      toks.push({t:'num',val,unit:'',price,raw:String(m[2])});
      if(suf){
        if(UNITW[suf]) toks.push({t:'unit',unit:UNITW[suf]});
        else if(SUF[suf]) toks.push({t:'kw',kw:SUF[suf],word:suf});
        else if(!FILLER.has(suf)) toks.push({t:'word',raw:suf});
      }
    } else {
      const w=m[0].toLowerCase();
      if(UNITW[w]) toks.push({t:'unit',unit:UNITW[w]});
      else if(KW[w]) toks.push({t:'kw',kw:KW[w],word:w});
      else if(!FILLER.has(w)) toks.push({t:'word',raw:m[0]});
    }
  }

  const F={}; const parts=[]; let pending=null, awaiting=null, unitTarget=null;
  for(let i=0;i<toks.length;i++){
    const tk=toks[i];
    if(tk.t==='num'){
      if(tk.percent){ parts.push({i,text:tk.raw}); unitTarget=null; continue; }
      if(tk.price){ if(!F.PRICE) F.PRICE={val:tk.val}; awaiting=null; pending=null; unitTarget=null; continue; }
      if(awaiting){ if(!F[awaiting.kw]) F[awaiting.kw]={val:tk.val,unit:tk.unit}; unitTarget=F[awaiting.kw]; awaiting=null; pending=null; }
      else { if(pending) parts.push(pending); pending={i,text:tk.raw,val:tk.val,unit:tk.unit}; unitTarget=pending; }
    } else if(tk.t==='unit'){
      if(unitTarget && !unitTarget.unit) unitTarget.unit=tk.unit;
      unitTarget=null;
    } else if(tk.t==='kw'){
      unitTarget=null;
      if(pending){ if(!F[tk.kw]) F[tk.kw]={val:pending.val,unit:pending.unit}; pending=null; }
      else { if(awaiting) parts.push(awaiting); awaiting={i,text:tk.word,kw:tk.kw}; }
    } else {
      if(pending){ parts.push(pending); pending=null; }
      if(awaiting){ parts.push(awaiting); awaiting=null; }
      unitTarget=null; parts.push({i,text:tk.raw});
    }
  }
  if(pending) parts.push(pending);
  if(awaiting) parts.push(awaiting);

  const out={};
  const mapU=u=> u==='l'?'L':(['g','kg','ml'].includes(u)?u:null);
  if(F.BASIS){ let a=F.BASIS.val,u=F.BASIS.unit; if(u==='kg'){a*=1000;u='g';} else if(u==='l'){a*=1000;u='ml';} out.basisAmt=a; if(u==='g'||u==='ml') out.basisUnit=u; }
  if(F.PACK){ out.packSize=F.PACK.val; const u=mapU(F.PACK.unit); if(u) out.packUnit=u; }
  if(F.PRICE) out.price=F.PRICE.val;
  if(F.KJ) out.kj=F.KJ.val; else if(F.CAL) out.kcal=F.CAL.val;
  if(F.PROTEIN) out.p=F.PROTEIN.val;
  if(F.CARB) out.c=F.CARB.val;
  if(F.FAT) out.f=F.FAT.val;

  const name=parts.sort((a,b)=>a.i-b.i).map(x=>x.text).filter(t=>/[\d%]/.test(t)||t.length>=2).join(' ').replace(/\s+/g,' ').trim();
  if(name) out.name=name.replace(/\b([a-z])/g,c=>c.toUpperCase());
  return out;
}

function openVoiceFill(onParsed){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  showModal('Add by text/voice', `
    <p class="muted" style="font-size:13px;margin-top:0">Say or type the food and its numbers, e.g. <i>"5% beef mince, 20 g protein, 120 cal per 100 g"</i> — or <b>paste a nutrition label</b> straight from a website and it'll read the panel. You can also tap the box and use your keyboard's 🎤.</p>
    <div style="text-align:center;margin:4px 0 12px"><button class="btn" id="vfMic" style="border-radius:999px;padding:12px 22px">🎤 <span id="vfMicLabel">Tap to speak</span></button></div>
    <textarea id="vfText" placeholder="…or type / dictate here" style="width:100%;height:88px;border:1px solid var(--border-strong);border-radius:10px;padding:10px;font-size:14px;background:var(--surface);color:var(--ink);font-family:var(--sans)"></textarea>
    <div id="vfStatus" style="font-size:12px;color:var(--muted);margin:8px 2px 0;min-height:16px"></div>
    <div style="display:flex;gap:10px;margin-top:12px"><button class="btn subtle" id="vfCancel" style="flex:1">Cancel</button><button class="btn" id="vfFill" style="flex:2">Fill the form</button></div>`, true);
  const txt=$id('vfText'), status=$id('vfStatus'), micBtn=$id('vfMic'), micLab=$id('vfMicLabel');
  let rec=null, listening=false;
  if(!SR){ micBtn.style.display='none'; status.textContent = "Live mic isn't available in this browser — tap the box and use your keyboard's mic, or type."; }
  const stop=()=>{ if(rec){ try{rec.stop()}catch(e){} } listening=false; micLab.textContent='Tap to speak'; micBtn.style.background=''; };
  if(micBtn) micBtn.addEventListener('click',()=>{
    if(!SR) return;
    if(listening){ stop(); return; }
    try{
      rec=new SR(); rec.lang='en-AU'; rec.interimResults=true; rec.continuous=false; rec.maxAlternatives=1;
      const base = txt.value ? txt.value.trim()+' ' : '';
      rec.onresult=e=>{ let s=''; for(let i=0;i<e.results.length;i++) s+=e.results[i][0].transcript; txt.value = base + s; };
      rec.onerror=ev=>{ status.textContent = ev.error==='not-allowed' ? 'Microphone permission was blocked — allow it in your browser settings.' : ('Mic error: '+ev.error); stop(); };
      rec.onend=()=>stop();
      rec.start(); listening=true; micLab.textContent='Listening… tap to stop'; micBtn.style.background='var(--danger)'; status.textContent='Listening — speak now.';
    }catch(e){ status.textContent='Could not start the mic here.'; }
  });
  $id('vfCancel').addEventListener('click',()=>{ stop(); closeModal2(); });
  $id('vfFill').addEventListener('click',()=>{
    stop();
    if(!txt.value.trim()){ status.textContent='Nothing to read yet — say or type something first.'; return; }
    onParsed(parseFoodSpeech(txt.value));
    closeModal2();
  });
  setTimeout(()=>txt.focus(),50);
}

function openPantryEditor(pid, onCreate, prefill){
  const isNew=!pid;
  const p = pid ? clone(item(pid)) : {id:uid(), name:'', cat:'Pantry', size:1, unit:'kg', price:0, onHand:0, nutri:{kcal:0,p:0,c:0,f:0}};
  const n = p.nutri || {kcal:0,p:0,c:0,f:0};
  if(p.nutriBasis==null) p.nutriBasis = familyOf(p.unit)==='count'?1:100;
  const basisVal = nutriBasisAmt(p);
  let enUnit = energyUnit();   // local: which energy unit this item's macros are typed in
  const enVal0 = +(enUnit==='kJ' ? (n.kcal||0)*KJ_PER_KCAL : (n.kcal||0)).toFixed(2);
  const catOpts=CATEGORIES.map(c=>`<option ${c===p.cat?'selected':''}>${c}</option>`).join('');
  const unitOpts=Object.keys(UNITS).map(u=>`<option value="${u}" ${u===p.unit?'selected':''}>${UNITS[u].label} (${UNITS[u].family})</option>`).join('');
  const body=`
    <label class="field"><span class="lab">Item name</span><input type="text" id="iName" value="${esc(p.name)}" placeholder="e.g. Beef topside roast"></label>
    <div style="display:flex;gap:8px;margin:0 0 12px">
      <button type="button" class="btn ghost tiny" id="voiceFill" style="flex:1">🎤 Add by text/voice</button>
      <button type="button" class="btn ghost tiny" id="offSearch" style="flex:1">🔍 Search</button>
    </div>
    <label class="field"><span class="lab">Category</span><select id="iCat">${catOpts}</select></label>
    <div class="row">
      <label class="field"><span class="lab">Pack size</span><input type="number" id="iSize" min="0" step="any" value="${p.size}" inputmode="decimal"></label>
      <label class="field"><span class="lab">Unit</span><select id="iUnit">${unitOpts}</select></label>
    </div>
    <label class="field"><span class="lab">Pack price (what you pay at the till)</span><input type="number" id="iPrice" min="0" step="0.01" value="${p.price}" inputmode="decimal"></label>
    <label class="field"><span class="lab">Amount already on hand (optional)</span><input type="number" id="iOnHand" min="0" step="any" value="${p.onHand||0}" inputmode="decimal"><span class="lab" style="margin-top:5px;font-weight:500">In the same unit — subtracted from your shopping list.</span></label>
    <div class="card" id="ppbPreview" style="background:var(--canvas);padding:11px 14px;font-size:13px"></div>
    <div class="section-title" style="margin:18px 2px 8px"><h2>Nutrition</h2><span class="count">optional</span></div>
    <div class="row">
      <label class="field"><span class="lab">Values are per</span>
        <div style="display:flex;gap:6px">
          <input type="number" id="nBasisAmt" min="0" step="any" value="${basisVal}" inputmode="decimal" style="flex:1">
          <span class="basis-chip" id="nBasisUnit">g</span>
        </div>
      </label>
      <label class="field"><span class="lab">Energy<span class="unit-toggle" id="enToggle"><button type="button" data-eu="kcal" class="${enUnit==='kcal'?'on':''}">kcal</button><button type="button" data-eu="kJ" class="${enUnit==='kJ'?'on':''}">kJ</button></span></span><input type="number" id="nK" min="0" step="any" value="${enVal0}" inputmode="decimal"></label>
    </div>
    <div class="row">
      <label class="field"><span class="lab">Protein (g)</span><input type="number" id="nP" min="0" step="any" value="${n.p||0}" inputmode="decimal"></label>
      <label class="field"><span class="lab">Carbs (g)</span><input type="number" id="nC" min="0" step="any" value="${n.c||0}" inputmode="decimal"></label>
    </div>
    <div class="row">
      <label class="field"><span class="lab">Fat (g)</span><input type="number" id="nF" min="0" step="any" value="${n.f||0}" inputmode="decimal"></label>
      <div style="flex:1"></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:14px">
      ${isNew?'':'<button class="btn subtle danger-link" id="delItem" style="flex:1;border:1px solid var(--danger);color:var(--danger);background:var(--danger-soft);border-radius:10px">Delete</button>'}
      <button class="btn subtle" id="cancelItem" style="flex:1">Cancel</button>
      <button class="btn" id="saveItem" style="flex:2">${isNew?'Add item':'Save'}</button>
    </div>`;
  showModal(isNew?'New pantry item':'Edit item', body, !!onCreate);
  let lastFam = UNITS[$id('iUnit').value].family;
  const basisUnitLabel = fam => fam==='weight'?'g':(fam==='volume'?'ml':'ea');
  const upd=()=>{
    const size=parseFloat($id('iSize').value)||0, price=parseFloat($id('iPrice').value)||0, unit=$id('iUnit').value;
    const base=size*(UNITS[unit]?UNITS[unit].toBase:1);
    const ppb= base>0? price/base : 0;
    const fam=UNITS[unit].family;
    const lab= fam==='count'?`${money(ppb)} each`:(fam==='weight'?`${money(ppb*1000)} per kg`:`${money(ppb*1000)} per L`);
    $id('ppbPreview').innerHTML = `Unit price: <b class="num">${lab}</b>`;
    if(fam!==lastFam){ $id('nBasisAmt').value = fam==='count'?1:100; lastFam=fam; }  // snap basis on family change
    $id('nBasisUnit').textContent = basisUnitLabel(fam);
  };
  ['iSize','iPrice','iUnit'].forEach(idd=>$id(idd).addEventListener('input',upd));
  $id('iUnit').addEventListener('change',upd); upd();
  const setEn=u=>{
    if(u===enUnit) return;
    const cur=parseFloat($id('nK').value)||0;
    const kcal = enUnit==='kJ'? cur/KJ_PER_KCAL : cur;     // back to kcal
    enUnit=u;
    $id('nK').value = +(u==='kJ'? kcal*KJ_PER_KCAL : kcal).toFixed(2);
    $modalQ('#enToggle [data-eu]').forEach(b=>b.classList.toggle('on', b.dataset.eu===enUnit));
  };
  $modalQ('#enToggle [data-eu]').forEach(b=>b.addEventListener('click',()=>setEn(b.dataset.eu)));
  // Shared additive fill used by Search, text/voice, and barcode scan.
  // Only overwrites the fields the incoming data actually specifies.
  function applyFood(food){
    if(!food || !Object.keys(food).length){ toast('Couldn\u2019t read that \u2014 try e.g. "chicken mince, 20p, 120 cal per 100g, $8"'); return false; }
    if(food.name) $id('iName').value = food.name;
    const packUnit = food.packUnit || food.unit;
    const packSize = (food.packSize!=null) ? food.packSize : food.size;
    if(packUnit){ const sel=$id('iUnit'); if([...sel.options].some(o=>o.value===packUnit)) sel.value=packUnit; }
    else if(food.basisUnit){
      const sel=$id('iUnit'); const wantFam=food.basisUnit==='ml'?'volume':'weight'; const want=food.basisUnit==='ml'?'ml':'g';
      if(UNITS[sel.value].family!==wantFam && [...sel.options].some(o=>o.value===want)) sel.value=want;
    }
    if(packSize>0) $id('iSize').value = packSize;
    if(food.price!=null) $id('iPrice').value = food.price;
    upd();                                              // recalc + snap basis if unit family changed
    if(food.basisAmt>0) $id('nBasisAmt').value = food.basisAmt;   // set after upd so it isn't overwritten
    if(food.kj!=null && food.kcal!=null){ $id('nK').value = +(enUnit==='kJ' ? food.kj : food.kcal).toFixed(2); }
    else if(food.kj!=null){ if(enUnit!=='kJ') setEn('kJ'); $id('nK').value = +food.kj.toFixed(2); }
    else if(food.kcal!=null){ if(enUnit!=='kcal') setEn('kcal'); $id('nK').value = +food.kcal.toFixed(2); }
    if(food.p!=null) $id('nP').value = food.p;
    if(food.c!=null) $id('nC').value = food.c;
    if(food.f!=null) $id('nF').value = food.f;
    return true;
  }
  $id('offSearch').addEventListener('click',()=>openFoodSearch(food=>{ if(applyFood(food)) toast('Filled from Open Food Facts — add your price'); }));
  $id('voiceFill').addEventListener('click',()=>openVoiceFill(food=>{ if(applyFood(food)) toast('Filled — check it over'); }));
  if(prefill){ if(applyFood(prefill)) toast(prefill.name?'Found it — check it over':'Found the barcode — add the name'); }
  $id('cancelItem').addEventListener('click', onCreate?closeModal2:closeModal);
  if(!isNew) $id('delItem').addEventListener('click',()=>{
    showConfirm({title:'Delete item?', message:'Delete "'+esc(p.name)+'"? It will be removed from any meals using it.', yes:'Delete', danger:true, stacked:true, onYes:()=>{
      S.pantry=S.pantry.filter(x=>x.id!==p.id);
      S.meals.forEach(m=>m.ings=(m.ings||[]).filter(i=>i.pid!==p.id));
      save(); closeModal(); render();
    }});
  });
  $id('saveItem').addEventListener('click',()=>{
    p.name=$id('iName').value.trim();
    p.cat=$id('iCat').value;
    p.size=Math.max(0,parseFloat($id('iSize').value)||0);
    p.unit=$id('iUnit').value;
    p.price=Math.max(0,parseFloat($id('iPrice').value)||0);
    p.onHand=Math.max(0,parseFloat($id('iOnHand').value)||0);
    const fam=UNITS[p.unit].family;
    let nb=parseFloat($id('nBasisAmt').value); if(!(nb>0)) nb = fam==='count'?1:100;
    p.nutriBasis=nb;
    const enRaw=Math.max(0,parseFloat($id('nK').value)||0);
    p.nutri={
      kcal: enUnit==='kJ' ? enRaw/KJ_PER_KCAL : enRaw,
      p:Math.max(0,parseFloat($id('nP').value)||0),
      c:Math.max(0,parseFloat($id('nC').value)||0),
      f:Math.max(0,parseFloat($id('nF').value)||0),
    };
    if(!p.name){ toast('Give the item a name'); return; }
    if(p.size<=0){ toast('Pack size must be greater than 0'); return; }
    const ix=S.pantry.findIndex(x=>x.id===p.id);
    if(ix>=0) S.pantry[ix]=p; else S.pantry.push(p);
    save();
    if(onCreate){ onCreate(p); }
    else { closeModal(); render(); }
  });
}

/* ---- SHOP tab ---- */
function shopRowMeta(e){
  return e.pid ? `${qtyStr(e.packSize,e.unit)} pack · ${money(e.price)} ea`
               : `${money(e.price)} ea`;
}
function renderShop(){
  const items = S.extras || [];
  const total = items.reduce((s,e)=> s + (e.done?0:e.price*(e.qty||1)),0);
  const fullTotal = items.reduce((s,e)=> s + e.price*(e.qty||1),0);
  const ticked = items.filter(e=>e.done).length;

  let html=`
    <div class="card summary">
      <div class="lab">Shopping list · still to buy</div>
      <div class="big num">${money(total)}</div>
      <div class="meta">${money(fullTotal)} all up · ${items.length} item${items.length!==1?'s':''}${ticked?` · ${ticked} ticked off`:''}</div>
    </div>`;

  // search-to-add
  html+=`<div style="position:relative;margin-bottom:12px">
    <input type="text" id="shopSearch" placeholder="🔍  Search to add an item…" autocomplete="off">
    <div id="shopResults" class="card" style="display:none;position:absolute;left:0;right:0;top:48px;z-index:6;max-height:300px;overflow:auto;padding:4px"></div>
  </div>`;

  // optional: pull from this week's plan
  const planLines = buildShopping();
  if(planLines.length){
    const notYet = planLines.filter(l=>!items.some(e=>e.pid===l.pid)).length;
    html+=`<div style="margin-bottom:14px"><button class="btn ghost tiny" id="importPlan">+ Add ${notYet||planLines.length} item${(notYet||planLines.length)!==1?'s':''} from this week's plan</button></div>`;
  }

  if(items.length===0){
    html+=`<div class="card empty"><div class="big">🛒</div><p>Your list is empty. Search above to add anything from your pantry — the total updates as you go. You can also pull in what this week's meals need.</p><button class="btn ghost" id="addCustomBtn">+ Add a custom item</button></div>`;
  } else {
    html+=`<div class="card">`;
    items.forEach(e=>{
      html+=`<div class="sitem ${e.done?'done':''}">
        <span class="check ${e.done?'on':''}" data-exc="${e.id}">${e.done?'✓':''}</span>
        <div class="grow"><div class="sname">${esc(e.name)}</div><div class="smeta">${shopRowMeta(e)}</div></div>
        <div class="stepper" data-sid="${e.id}"><button data-sact="dec">−</button><span class="n num">${e.qty||1}</span><button data-sact="inc">+</button></div>
        <span class="sc num">${money(e.price*(e.qty||1))}</span>
        <button class="icon-btn danger" data-rmex="${e.id}" title="Remove">✕</button>
      </div>`;
    });
    html+=`</div>`;
    html+=`<div style="margin-top:12px;text-align:center"><button class="btn ghost tiny" id="addCustomBtn">+ Add a custom item</button></div>`;
  }

  $view.innerHTML=html;

  // live search results (pantry), filtered in place — no full re-render while typing
  const search=document.getElementById('shopSearch');
  const resBox=document.getElementById('shopResults');
  const rowHtml=p=>`<div class="planrow shopres" data-pid="${p.id}" data-name="${esc(p.name.toLowerCase())}" style="cursor:pointer;padding:9px 10px;border:0">
      <div class="grow"><div class="pn">${esc(p.name)}</div><div class="pm"><span class="num">${money(p.price)}</span> / ${qtyStr(p.size,p.unit)}</div></div>
      <span class="btn tiny">Add</span></div>`;
  const renderResults=()=>{
    const q=search.value.trim().toLowerCase();
    if(!q){ resBox.style.display='none'; resBox.innerHTML=''; return; }
    let h=S.pantry.filter(p=>p.name.toLowerCase().includes(q)).map(rowHtml).join('');
    h+=`<div class="planrow" id="shopAddCustom" style="cursor:pointer;padding:9px 10px;border:0">
        <div class="grow"><div class="pn">Add "${esc(search.value.trim())}"</div><div class="pm">custom item — set your own price</div></div>
        <span class="btn tiny ghost">+</span></div>`;
    resBox.innerHTML=h;
    resBox.style.display='';
    resBox.querySelectorAll('.shopres').forEach(el=>el.addEventListener('click',()=>addShopPantry(el.dataset.pid)));
    const ac=document.getElementById('shopAddCustom'); if(ac) ac.addEventListener('click',()=>openShopCustom(search.value.trim()));
  };
  search.addEventListener('input',renderResults);
  search.addEventListener('focus',renderResults);

  on('#importPlan','click',importPlanToShop);
  on('#addCustomBtn','click',()=>openShopCustom(''));
  $view.querySelectorAll('[data-exc]').forEach(el=>el.addEventListener('click',()=>{
    const e=S.extras.find(x=>x.id===el.dataset.exc); e.done=!e.done; save(); render();
  }));
  $view.querySelectorAll('[data-rmex]').forEach(el=>el.addEventListener('click',()=>{
    S.extras=S.extras.filter(x=>x.id!==el.dataset.rmex); save(); render();
  }));
  $view.querySelectorAll('.stepper[data-sid]').forEach(st=>{
    const e=S.extras.find(x=>x.id===st.dataset.sid);
    st.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
      e.qty=Math.max(1,(e.qty||1)+(b.dataset.sact==='inc'?1:-1)); save(); render();
    }));
  });
}
function addShopPantry(pid){
  const p=item(pid); if(!p) return;
  const ex=S.extras.find(e=>e.pid===pid);
  if(ex){ ex.qty=(ex.qty||1)+1; ex.done=false; toast('Added another'); }
  else { S.extras.push({id:uid(), pid, name:p.name, price:p.price, qty:1, unit:p.unit, packSize:p.size, done:false}); toast('Added to list'); }
  save(); render();
}
function importPlanToShop(){
  const lines=buildShopping(); let added=0;
  lines.forEach(l=>{
    if(S.extras.some(e=>e.pid===l.pid)) return;
    const p=item(l.pid);
    S.extras.push({id:uid(), pid:l.pid, name:l.name, price:p?p.price:0, qty:Math.max(1,l.packs||1), unit:l.unit, packSize:l.packSize, done:false});
    added++;
  });
  save(); render(); toast(added?`Added ${added} item${added!==1?'s':''}`:'Already on your list');
}
function openShopCustom(prefill){
  const body=`
    <label class="field"><span class="lab">Item</span><input type="text" id="eName" value="${esc(prefill||'')}" placeholder="e.g. Dish soap"></label>
    <div class="row">
      <label class="field"><span class="lab">Price each</span><input type="number" id="ePrice" min="0" step="0.01" value="0" inputmode="decimal"></label>
      <label class="field"><span class="lab">Quantity</span><input type="number" id="eQty" min="1" step="1" value="1" inputmode="numeric"></label>
    </div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn subtle" id="cancelEx" style="flex:1">Cancel</button>
      <button class="btn" id="saveEx" style="flex:2">Add to list</button>
    </div>`;
  showModal('Add custom item', body);
  $id('cancelEx').addEventListener('click',closeModal);
  $id('saveEx').addEventListener('click',()=>{
    const name=$id('eName').value.trim();
    if(!name){toast('Name needed');return;}
    S.extras.push({id:uid(),name,price:Math.max(0,parseFloat($id('ePrice').value)||0),qty:Math.max(1,parseInt($id('eQty').value)||1),done:false});
    save(); closeModal(); render();
  });
}

/* ---- Budget edit ---- */
document.getElementById('budgetChip').addEventListener('click',()=>{
  const body=`<label class="field"><span class="lab">Weekly grocery budget (AUD)</span><input type="number" id="bVal" min="0" step="1" value="${S.budget}"></label>
    <div style="display:flex;gap:10px"><button class="btn subtle" id="cancelB" style="flex:1">Cancel</button><button class="btn" id="saveB" style="flex:2">Save budget</button></div>`;
  showModal('Set weekly budget', body);
  $id('cancelB').addEventListener('click',closeModal);
  $id('saveB').addEventListener('click',()=>{ S.budget=Math.max(0,parseFloat($id('bVal').value)||0); save(); closeModal(); render(); });
});

/* ---- Settings ---- */
function openSettings(){
  const st=S.settings;
  const body=`
    <div class="set-head">Appearance</div>
    <div class="set-row">
      <div class="grow"><div class="st">Dark mode</div><div class="sd">Easier on the eyes at night.</div></div>
      <button class="switch ${st.dark?'on':''}" id="setDark" role="switch" aria-checked="${st.dark}" aria-label="Dark mode"></button>
    </div>
    <div class="set-head">Units</div>
    <div class="set-row">
      <div class="grow"><div class="st">Energy</div><div class="sd">Show calories or kilojoules across the app.</div></div>
      <div class="seg-row" style="width:148px;flex:0 0 auto" id="setEnergy">
        <button class="seg ${energyUnit()==='kcal'?'on':''}" data-eu="kcal">kcal</button>
        <button class="seg ${energyUnit()==='kJ'?'on':''}" data-eu="kJ">kJ</button>
      </div>
    </div>
    <div class="set-row">
      <div class="grow"><div class="st">Weekly budget</div><div class="sd">Tracked on the Plan tab.</div></div>
      <input type="number" id="setBudget" min="0" step="1" value="${S.budget}" style="width:108px;flex:0 0 auto;text-align:right">
    </div>
    <div class="set-head">Data</div>
    <div style="display:flex;gap:10px;margin-top:10px">
      <button class="btn subtle" id="setExport" style="flex:1">Export / import</button>
      <button class="btn subtle" id="setReset" style="flex:1;color:var(--danger);border-color:var(--danger)">Reset all data</button>
    </div>
    <div style="margin-top:16px"><button class="btn" id="setClose" style="width:100%">Done</button></div>`;
  showModal('Settings', body);
  $id('setDark').addEventListener('click',()=>{
    S.settings.dark=!S.settings.dark; applyTheme(); save();
    const b=$id('setDark'); b.classList.toggle('on',S.settings.dark); b.setAttribute('aria-checked',S.settings.dark);
  });
  $modalQ('#setEnergy [data-eu]').forEach(b=>b.addEventListener('click',()=>{
    S.settings.energyUnit=b.dataset.eu; save();
    $modalQ('#setEnergy [data-eu]').forEach(x=>x.classList.toggle('on',x.dataset.eu===S.settings.energyUnit));
    render();
  }));
  $id('setBudget').addEventListener('input',()=>{ S.budget=Math.max(0,parseFloat($id('setBudget').value)||0); document.getElementById('budgetVal').textContent=money(S.budget); save(); render(); });
  $id('setExport').addEventListener('click',openExport);
  $id('setReset').addEventListener('click',()=>{ closeModal(); confirmReset(); });
  $id('setClose').addEventListener('click',closeModal);
}
document.getElementById('settingsBtn').addEventListener('click',openSettings);

/* ---- Export / import / reset ---- */
function openExport(){
  const data = JSON.stringify(S,null,2);
  const body=`<p class="muted" style="font-size:13px;margin-top:0">Copy this to back up your data, or paste a backup in to restore it.</p>
    <textarea id="exp" style="width:100%;height:200px;font-family:var(--mono);font-size:11px;border:1px solid var(--border-strong);border-radius:9px;padding:10px">${esc(data)}</textarea>
    <div style="display:flex;gap:10px;margin-top:12px">
      <button class="btn subtle" id="copyExp" style="flex:1">Copy</button>
      <button class="btn" id="importExp" style="flex:1">Import pasted data</button>
    </div>`;
  showModal('Export / import', body);
  $id('copyExp').addEventListener('click',()=>{ const t=$id('exp'); t.select(); try{document.execCommand('copy')}catch(e){} toast('Copied'); });
  $id('importExp').addEventListener('click',()=>{
    try{
      const o=JSON.parse($id('exp').value);
      o.plan = (o.plan||[]).map(pl=> pl.type ? pl : {type:'meal', mealId:pl.mealId, servings:pl.servings});
      o.settings = o.settings || {dark:false, energyUnit:'kcal'};
      (o.pantry||[]).forEach(p=>{ if(p.nutriBasis==null) p.nutriBasis = familyOf(p.unit)==='count'?1:100; });
      S=o; applyTheme(); save(); closeModal(); render(); toast('Imported');
    }
    catch(e){ toast('That isn\'t valid backup data'); }
  });
}
function confirmReset(){
  showConfirm({title:'Reset everything?', message:'Reset back to the starter data? Your meals, prices and plan will be replaced.', yes:'Reset', danger:true, onYes:()=>{ S=clone(SEED); save(); render(); toast('Reset to starter data'); }});
}

/* ---------------- Modal plumbing (supports 1 stacked modal) ---------------- */
function showModal(title, bodyHtml, stacked){
  const root=document.getElementById('modalRoot');
  const wrap=document.createElement('div'); wrap.className='scrim'; wrap.dataset.lvl= stacked?'2':'1';
  wrap.innerHTML=`<div class="modal"><div class="modal-head"><h3>${esc(title)}</h3><button class="icon-btn" data-close>✕</button></div><div class="mbody">${bodyHtml}</div></div>`;
  if(!stacked){ root.innerHTML=''; }
  root.appendChild(wrap);
  wrap.addEventListener('click',e=>{ if(e.target===wrap){ stacked?closeModal2():closeModal(); } });
  wrap.querySelector('[data-close]').addEventListener('click',()=> stacked?closeModal2():closeModal());
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }
function closeModal2(){ const s=document.querySelectorAll('.scrim[data-lvl="2"]'); s.forEach(x=>x.remove()); }
function showConfirm(opts){
  const stacked=!!opts.stacked;
  showModal(opts.title||'Are you sure?', `
    <p style="font-size:14.5px;line-height:1.5;margin:0 0 18px;color:var(--ink)">${opts.message||''}</p>
    <div style="display:flex;gap:10px">
      <button class="btn subtle" id="cfNo" style="flex:1">Cancel</button>
      <button class="btn${opts.danger?' danger':''}" id="cfYes" style="flex:1">${esc(opts.yes||'Confirm')}</button>
    </div>`, stacked);
  const close = stacked?closeModal2:closeModal;
  $id('cfNo').addEventListener('click',close);
  $id('cfYes').addEventListener('click',()=>{ close(); if(opts.onYes) opts.onYes(); });
}
function $modalQ(sel){ return Array.from(document.querySelectorAll('#modalRoot '+sel)); }
function $id(id){ return document.getElementById(id); }

/* ---------------- small utils ---------------- */
function on(sel,ev,fn){ document.querySelectorAll(sel).forEach(el=>el.addEventListener(ev,fn)); }
let toastTimer=null;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1900);
}
document.getElementById('tabs').addEventListener('click',e=>{
  const b=e.target.closest('button[data-tab]'); if(!b)return; TAB=b.dataset.tab; render();
});

/* ---------------- boot ---------------- */
(async()=>{
  $view.innerHTML=`<div class="empty"><div class="big">⏳</div><p>Loading your kitchen…</p></div>`;
  await load();
  render();
})();
</script>
